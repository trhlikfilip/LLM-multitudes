<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Country Bias Audit</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f8fa;--c1:#ffffff;--c2:#eef0f4;--bd:#cdd3de;
  --tx:#2d3340;--dm:#6b7588;--wh:#111827;
  --cy:#0369a1;--pk:#9d174d;--gn:#047857;--rd:#b91c1c;
  --am:#b45309;--pu:#6d28d9;--or:#9a3412;--id:#4338ca;
}
body{background:var(--bg);color:var(--tx);font-family:'Instrument Sans',system-ui,sans-serif;min-height:100vh;padding:20px 16px;-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:26px;font-weight:800;color:var(--wh);letter-spacing:-.5px}
.sub{font-size:12px;color:var(--dm);margin-top:4px;line-height:1.5}
.sub span{font-weight:600}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin:18px 0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:11px 15px;border:none;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:500;color:var(--dm);background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--wh);font-weight:700;background:rgba(67,56,202,.07);border-bottom-color:var(--id)}
.grid{display:grid;gap:10px}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
.g1{grid-template-columns:1fr}
.met{background:var(--c1);border:1px solid var(--bd);border-radius:10px;padding:14px 10px;text-align:center;border-top:3px solid var(--id)}
.met .v{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.met .l{font-size:10.5px;font-weight:600;color:var(--tx);margin-top:3px}
.met .s{font-size:9px;color:var(--dm);margin-top:2px}
.sec{margin-bottom:26px}
.sec h3{font-size:15px;font-weight:700;color:var(--wh);margin-bottom:4px}
.sec .desc{font-size:11.5px;color:var(--dm);margin-bottom:12px;line-height:1.5}
.box{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:14px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px}
.box .label{font-size:10px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-family:'IBM Plex Mono',monospace}
.call{border-radius:8px;padding:14px 18px;margin-bottom:16px}
.call .ct{font-size:13px;font-weight:700;margin-bottom:5px}
.call .cd{font-size:11.5px;color:var(--dm);line-height:1.65}
.leg{display:flex;gap:12px;font-size:10px;margin-bottom:10px;flex-wrap:wrap}
.leg .li{display:flex;align-items:center;gap:5px}
.leg .li .dot{width:10px;height:10px;border-radius:2px}
.leg .li span{font-weight:600;font-family:'IBM Plex Mono',monospace}
.pills{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:500;border:1px solid var(--bd);background:var(--c1);color:var(--dm);transition:all .15s}
.pill.on{border:2px solid var(--id);background:rgba(67,56,202,.07);color:var(--id);font-weight:700}
.finding{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:13px 16px;border-left:3px solid var(--id)}
.finding .ft{font-size:11.5px;font-weight:700;margin-bottom:5px}
.finding .fd{font-size:10.5px;color:var(--dm);line-height:1.55}
table{border-collapse:collapse;width:100%;font-size:10px}
th{padding:5px 6px;color:var(--dm);border-bottom:2px solid var(--bd);text-align:left;font-size:9px;font-family:'IBM Plex Mono',monospace}
td{padding:4px 6px;border-bottom:1px solid var(--bd)}
svg{display:block}
.pane{display:none}
.pane.show{display:block}
.footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--bd);font-size:9px;color:var(--dm);text-align:center;font-family:'IBM Plex Mono',monospace}
.guide{background:var(--c2);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:11.5px;color:var(--tx);line-height:1.65;border-left:3px solid var(--id)}
.guide strong{color:var(--wh)}
.scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.attack{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:15px 18px;margin-bottom:10px}
.attack .at{font-size:13px;font-weight:700;margin-bottom:7px}
.attack .ad{font-size:11.5px;color:var(--dm);line-height:1.65}
@media(max-width:600px){
  body{padding:12px 8px}
  h1{font-size:20px}
  .sub{font-size:10px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g5{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .met .v{font-size:20px}
  .met .l{font-size:9px}
  .met{padding:10px 6px}
  .tab{padding:9px 10px;font-size:10px}
  .pill{padding:5px 8px;font-size:9px}
  .box{padding:10px 8px}
  .call{padding:10px 12px}
  .call .ct{font-size:12px}
  .call .cd{font-size:10.5px}
  .attack .at{font-size:12px}
  .attack .ad{font-size:10.5px}
  .finding .ft{font-size:11px}
  .finding .fd{font-size:10px}
  .sec h3{font-size:13px}
  .sec .desc{font-size:10.5px}
  table{font-size:9px}
  th{font-size:8px}
  .guide{font-size:10.5px;padding:10px 12px}
}
</style>
</head>

function drawTempConsLine(container, mode){
  const TM=TEMP_MODELS;
  let labels, seriesData;

  if(mode==='trait'){
    labels=TRAITS.map(t=>TL[t]);
    seriesData=TRAITS.map(trait=>{
      return TM.map(m=>{
        const vals=m.ucs.map(uc=>m.cl[uc+'|'+trait]).filter(v=>v!=null);
        return vals.length?vals.reduce((s,x)=>s+x,0)/vals.length:0;
      });
    });
  } else {
    labels=['neutral','reddit','school/research','vlog'];
    seriesData=labels.map((lbl,li)=>{
      return TM.map(m=>{
        const uc=li===2?(m.ucs.includes('school')?'school':'research'):['neutral','reddit','school','vlog'][li];
        const vals=TRAITS.map(t=>m.cl[uc+'|'+t]).filter(v=>v!=null);
        return vals.length?vals.reduce((s,x)=>s+x,0)/vals.length:0;
      });
    });
  }

  const W=780,H=190,ml=80,mr=20,mt=20,mb=35;
  const pw=W-ml-mr,ph=H-mt-mb;
  const n=labels.length;
  const s=svg(W,H,container);
  const yMin=50,yMax=100;

  const steps=5;
  for(let i=0;i<=steps;i++){
    const y=mt+ph*i/steps;
    const v=yMax-(yMax-yMin)*i/steps;
    S('line',{x1:ml,y1:y,x2:W-mr,y2:y,stroke:'var(--bd)',strokeWidth:1},s);
    S('text',{x:ml-6,y:y+3,fill:'var(--dm)',fontSize:9,textAnchor:'end',fontFamily:fn,text:v.toFixed(0)+'%'},s);
  }

  labels.forEach((l,i)=>{
    const x=ml+pw*i/(n-1||1);
    S('text',{x,y:H-8,fill:'var(--dm)',fontSize:8,textAnchor:'middle',fontFamily:fn,text:l.substring(0,10)},s);
  });

  TM.forEach((m,ti)=>{
    const pts=labels.map((l,li)=>{
      const x=ml+pw*li/(n-1||1);
      const v=seriesData[li][ti];
      const y=mt+ph*(1-(v-yMin)/(yMax-yMin));
      return{x,y};
    });
    const pStr=pts.map(p=>p.x+','+p.y).join(' ');
    S('polyline',{points:pStr,fill:'none',stroke:m.col,strokeWidth:2,strokeOpacity:0.8},s);
    pts.forEach(p=>S('circle',{cx:p.x,cy:p.y,r:3,fill:m.col},s));
  });

  const leg=document.createElement('div');leg.className='leg';leg.style.marginTop='6px';
  TM.forEach(m=>{
    const li=document.createElement('span');li.className='li';
    li.innerHTML='<span class="dot" style="background:'+m.col+'"></span><span>'+m.short+'</span>';
    leg.appendChild(li);
  });
  container.appendChild(leg);
}

function drawTempNSChart(container){
  const TM=TEMP_MODELS;
  const W=740,H=300,lM=50,rM=20,tM=40,bM=35,cW=W-lM-rM,cH=H-tM-bM,maxG=4;
  const barW=14,gapW=2,groupW=barW*TM.length+gapW*(TM.length-1)+8;
  const ucs=['neutral','reddit','school','vlog'];

  const s=svg(W,H,container);

  S('line',{x1:lM,y1:zY,x2:W-rM,y2:zY,stroke:'var(--bd)',strokeWidth:1.5},s);

  ucs.forEach((uc,i)=>{

    TM.forEach((m,mi)=>{
      const ucKey=m.ucs.includes(uc)?uc:(uc==='school'&&m.ucs.includes('research')?'research':uc);

      const bx=x+mi*(barW+gapW),h=Math.abs(g)/maxG*(cH/2);

    li.innerHTML='<span class="dot" style="background:'+m.col+'"></span><span>'+m.short+'</span>';
    leg.appendChild(li);
  });

function drawTempVolBar(container){
  const TM=TEMP_MODELS;
  const vol={};
  CS.forEach(c=>{
    const stds=[];
    TRAITS.forEach(trait=>{
      ['neutral','reddit','vlog'].forEach(uc=>{
        const mus=TM.map(m=>m.bc[trait]?.[c]?.[uc]?.mu).filter(v=>v!=null);
        if(mus.length>=3){
          const avg=mus.reduce((s,x)=>s+x,0)/mus.length;
          const std=Math.sqrt(mus.reduce((s,x)=>s+(x-avg)*(x-avg),0)/mus.length);
          stds.push(std);
        }
      });
    });
    vol[c]=stds.length?+(stds.reduce((s,x)=>s+x,0)/stds.length).toFixed(2):0;
  });

  const sorted=CS.map(c=>({c,v:vol[c]})).sort((a,b)=>b.v-a.v);
  const W=780,bh=16,gap=3,ml=110,mr=40,mt=5;
  const H=mt+(bh+gap)*sorted.length;
  const maxV=Math.max(...sorted.map(x=>x.v))*1.1||1;
  const pw=W-ml-mr;
  const s=svg(W,H,container);

  sorted.forEach((d,i)=>{
    const y=mt+i*(bh+gap);
    const bw=pw*d.v/maxV;
    const isNorth=NORTH.includes(d.c);
    const col=isNorth?'var(--id)':'var(--or)';
    S('text',{x:ml-6,y:y+bh/2+3,fill:'var(--dm)',fontSize:9,textAnchor:'end',fontFamily:fn,text:d.c},s);
    S('rect',{x:ml,y,width:Math.max(bw,2),height:bh,fill:col,rx:3,fillOpacity:0.7},s);
    S('text',{x:ml+bw+5,y:y+bh/2+3,fill:'var(--tx)',fontSize:9,fontFamily:fn,text:d.v.toFixed(2)},s);
  });
}

  const kwSig=Object.values(PD.kw).filter(v=>v.p<0.05).length;

  </div>

  ${sec('Cross-Persona Comparison','All 6 personas at t=1.0: how similar are school and research relative to other persona pairs?')}

  <div class="grid g2" style="margin-bottom:14px">
    ${[
      {t:'school↔research is NOT the most different pair',d:'Mean rank distance: school↔research = 0.70. But vlog↔research = 1.24 and reddit↔school = 0.94 are both larger. school↔research is a moderate gap, not an outlier.',c:'var(--cy)'},
      {t:'research ≈ neutral ≈ academic (the formal cluster)',d:'research↔academic: 0.42 (most similar pair). neutral↔research: 0.48. These three personas produce near-identical rankings. School is close but slightly more egalitarian. Reddit and vlog are the real outliers.',c:'var(--id)'},
      {t:'vlog is the most divergent persona',d:'vlog↔research: 1.24, vlog↔neutral: 1.07, vlog↔school: 1.03. Vlog consistently produces the most different rankings from every other persona, and has the smallest N-S gap (+0.63).',c:'var(--pk)'},
      {t:'N-S gap spans 0.63 to 3.17 across personas',d:'research (+3.17) > academic (+2.97) > neutral (+2.48) > reddit (+2.42) > school (+2.13) > vlog (+0.63). The formal "research" framing maximises Western bias; the casual "vlog" framing nearly eliminates it.',c:'var(--am)'}

  <div class="grid g2" style="gap:10px;margin-bottom:12px">
    <div class="box"><div class="label">Mean Absolute Rank Distance</div><div id="pm_dist"></div></div>

function drawPersonaDist(parent, trait){
  const PD=PDATA;
  const personas=['school','research','academic'];
  const pcols={'school':'#059669','research':'#4f46e5','academic':'#ea580c'};
  const W=700,rowH=46,lM=110,rM=14,tM=30,cW=W-lM-rM;
  const xS=r=>lM+((r-.5)/15)*cW;
  const sorted=[...CS].sort((a,b)=>{
    const f=c=>personas.reduce((s,uc)=>(s+(PD.dist[trait]?.[c]?.[uc]?.mu||8)),0)/personas.length;
    return f(a)-f(b);
  });
  const tH=tM+sorted.length*rowH+10;const s=svg(W,tH,parent);
  for(let r=1;r<=15;r++){
    S('line',{x1:xS(r),y1:tM-3,x2:xS(r),y2:tH-6,stroke:'var(--bd)',strokeWidth:.5},s);
    S('text',{x:xS(r),y:tM-7,textAnchor:'middle',fill:'var(--dm)',fontSize:8,fontFamily:fn,text:'#'+r},s);
  }
  sorted.forEach((c,idx)=>{
    const yO=tM+idx*rowH,isN=NORTH.includes(c);
    const kwP=PD.kw[c+'|'+trait]?.p||1;
    const isSig=kwP<0.05;
    S('rect',{x:0,y:yO,width:W,height:rowH,fill:idx%2===0?'var(--c1)':'transparent'},s);
    if(isSig)S('rect',{x:lM-2,y:yO,width:cW+4,height:rowH,fill:'rgba(185,28,28,.06)',rx:3},s);
    S('rect',{x:4,y:yO+rowH/2-4,width:6,height:8,rx:2,fill:isN?'var(--id)':'var(--or)',fillOpacity:.6},s);
    S('text',{x:lM-6,y:yO+rowH/2+1,textAnchor:'end',fill:isSig?'var(--rd)':'var(--tx)',fontSize:9,fontFamily:fs,fontWeight:isSig?700:500,dominantBaseline:'middle',text:c.length>13?c.substring(0,12)+'…':c},s);
    if(isSig)S('text',{x:lM-6,y:yO+rowH/2+11,textAnchor:'end',fill:'var(--rd)',fontSize:7,dominantBaseline:'middle',text:'⚡p='+kwP.toFixed(3)},s);
    const barH=7,gap=1,totalH=personas.length*(barH+gap)-gap,startY=yO+(rowH-totalH)/2;
    personas.forEach((uc,ui)=>{
      const d=PD.dist[trait]?.[c]?.[uc];if(!d)return;
      const col=pcols[uc],y=startY+ui*(barH+gap),ciW=xS(d.hi)-xS(d.lo);
      if(ciW>1)S('rect',{x:xS(d.lo),y:y,width:ciW,height:barH,fill:col,fillOpacity:.18,rx:barH/2,stroke:col,strokeWidth:.4,strokeOpacity:.4},s);
      S('circle',{cx:xS(d.mu),cy:y+barH/2,r:d.std<0.01?3.5:3,fill:col,stroke:'rgba(0,0,0,.1)',strokeWidth:.5},s);
    });
  });
}

function drawPersonaKW(parent){
  const PD=PDATA;
  const W=720,cellW=38,cellH=22,lM=110,tM=50;
  const H=tM+CS.length*cellH+10;
  const s=svg(W,H,parent);
  S('text',{x:lM+TRAITS.length*cellW/2,y:14,textAnchor:'middle',fill:'var(--wh)',fontSize:11,fontFamily:fs,fontWeight:700,text:'Kruskal-Wallis: school vs research vs academic'},s);
  S('text',{x:lM+TRAITS.length*cellW/2,y:28,textAnchor:'middle',fill:'var(--dm)',fontSize:8,fontFamily:fn,text:'5 repeats per persona = 15 obs per cell | green = p<0.05'},s);
  TRAITS.forEach((t,j)=>S('text',{x:lM+j*cellW+cellW/2,y:tM-8,textAnchor:'middle',fill:'var(--dm)',fontSize:7,fontFamily:fn,fontWeight:600,text:TL[t].substring(0,6)},s));
  CS.forEach((c,i)=>{
    const isN=NORTH.includes(c);
    S('rect',{x:2,y:tM+i*cellH+cellH/2-4,width:5,height:8,rx:2,fill:isN?'var(--id)':'var(--or)',fillOpacity:.5},s);
    S('text',{x:lM-6,y:tM+i*cellH+cellH/2+3,textAnchor:'end',fill:'var(--tx)',fontSize:8,fontFamily:fs,text:c.length>12?c.substring(0,11)+'…':c},s);
    TRAITS.forEach((t,j)=>{
      const d=PD.kw[c+'|'+t];if(!d)return;
      const p=d.p;
      const col=p<0.05?'var(--gn)':p<0.1?'rgba(180,83,9,.1)':'transparent';
      const tc=p<0.05?'var(--wh)':p<0.1?'var(--dm)':'var(--dm)';
      S('rect',{x:lM+j*cellW+1,y:tM+i*cellH+1,width:cellW-2,height:cellH-2,rx:3,fill:col,fillOpacity:p<0.05?.3:p<0.1?.15:0,stroke:p<0.1?tc:'var(--bd)',strokeWidth:p<0.05?1.5:.5,strokeOpacity:p<0.05?.8:.3},s);
      S('text',{x:lM+j*cellW+cellW/2,y:tM+i*cellH+cellH/2+3,textAnchor:'middle',fill:tc,fontSize:7,fontFamily:fn,fontWeight:p<0.05?800:400,text:p<0.001?'<.001':p.toFixed(p<0.1?2:1)},s);
    });
  });
}

function drawPersonaDiffs(parent){
  const PD=PDATA;
  const diffs=[];
  TRAITS.forEach(tr=>{
    CS.forEach(c=>{
      const ms=PD.dist[tr]?.[c]?.school?.mu||8;
      const mr=PD.dist[tr]?.[c]?.research?.mu||8;
      const ma=PD.dist[tr]?.[c]?.academic?.mu||8;
      const d=Math.abs(ms-mr);
      if(d>=1.5) diffs.push({c,tr,ms,mr,ma,d:ms-mr});
    });
  });
  diffs.sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
  const W=720,bh=18,gap=3,lM=180,mr=50,mt=5;
  const pw=W-lM-mr;
  const maxD=Math.max(...diffs.map(x=>Math.abs(x.d)))*1.1||1;
  const H=mt+(bh+gap)*diffs.length+5;
  const s=svg(W,H,parent);
  const zX=lM+pw/2;
  S('line',{x1:zX,y1:mt,x2:zX,y2:H-5,stroke:'var(--bd)',strokeWidth:1},s);
  [-4,-2,0,2,4].forEach(v=>{
    const x=zX+v/maxD*(pw/2);
    S('line',{x1:x,y1:mt-2,x2:x,y2:H-5,stroke:'var(--bd)',strokeWidth:.3,strokeDasharray:'2,2'},s);
  });
  S('text',{x:lM,y:mt-4,fill:'#059669',fontSize:7,fontFamily:fn,text:'← school better'},s);
  S('text',{x:W-mr,y:mt-4,fill:'#4f46e5',fontSize:7,fontFamily:fn,textAnchor:'end',text:'research better →'},s);
  diffs.forEach((d,i)=>{
    const y=mt+i*(bh+gap);
    const isN=NORTH.includes(d.c);
    S('text',{x:lM-6,y:y+bh/2+3,textAnchor:'end',fill:'var(--dm)',fontSize:8,fontFamily:fn,text:TL[d.tr].substring(0,8)+' '+d.c},s);
    const bw=Math.abs(d.d)/maxD*(pw/2);
    const x=d.d>0?zX:zX-bw;
    const col=d.d>0?'#4f46e5':'#059669';
    S('rect',{x,y,width:Math.max(bw,2),height:bh,fill:col,rx:3,fillOpacity:.6},s);
    S('text',{x:d.d>0?x+bw+4:x-4,y:y+bh/2+3,textAnchor:d.d>0?'start':'end',fill:'var(--tx)',fontSize:8,fontFamily:fn,fontWeight:600,text:(d.d>0?'+':'')+d.d.toFixed(1)},s);
  });
}

function drawPersonaMatrix(parent, dataKey, title, subtitle, fmt, colorFn){
  const ucs=PCMP.ucs;
  const W=440,cellW=55,cellH=28,lM=80,tM=60;
  const H=tM+ucs.length*cellH+10;
  const s=svg(W,H,parent);
  S('text',{x:lM+ucs.length*cellW/2,y:16,textAnchor:'middle',fill:'var(--wh)',fontSize:10,fontFamily:fs,fontWeight:700,text:title},s);
  S('text',{x:lM+ucs.length*cellW/2,y:30,textAnchor:'middle',fill:'var(--dm)',fontSize:7,fontFamily:fn,text:subtitle},s);
  const pcols={neutral:'#4f46e5',reddit:'#ea580c',school:'#059669',vlog:'#db2777',research:'#4f46e5',academic:'#d97706'};
  ucs.forEach((uc,j)=>S('text',{x:lM+j*cellW+cellW/2,y:tM-8,textAnchor:'middle',fill:pcols[uc]||'var(--dm)',fontSize:8,fontFamily:fn,fontWeight:700,text:uc},s));
  ucs.forEach((uc1,i)=>{
    S('text',{x:lM-6,y:tM+i*cellH+cellH/2+3,textAnchor:'end',fill:pcols[uc1]||'var(--tx)',fontSize:8,fontFamily:fn,fontWeight:700,text:uc1},s);
    ucs.forEach((uc2,j)=>{
      if(i===j){
        S('rect',{x:lM+j*cellW+1,y:tM+i*cellH+1,width:cellW-2,height:cellH-2,rx:3,fill:'var(--c2)',stroke:'var(--bd)',strokeWidth:.5},s);
        S('text',{x:lM+j*cellW+cellW/2,y:tM+i*cellH+cellH/2+3,textAnchor:'middle',fill:'var(--dm)',fontSize:8,fontFamily:fn,text:'—'},s);
        return;
      }
      const key1=uc1+'|'+uc2, key2=uc2+'|'+uc1;
      const data=PCMP[dataKey];
      let val=data[key1]!==undefined?data[key1]:data[key2];
      if(val===undefined)return;
      if(typeof val==='object') val=val.rate!==undefined?val.rate:val;
      const {bg,fg}=colorFn(val);
      S('rect',{x:lM+j*cellW+1,y:tM+i*cellH+1,width:cellW-2,height:cellH-2,rx:3,fill:bg,fillOpacity:.3,stroke:bg,strokeWidth:1,strokeOpacity:.4},s);
      S('text',{x:lM+j*cellW+cellW/2,y:tM+i*cellH+cellH/2+3,textAnchor:'middle',fill:fg,fontSize:8,fontFamily:fn,fontWeight:700,text:fmt(val)},s);
    });
  });
}

function drawNSGapBars(parent){
  const ucs=PCMP.ucs;
  const gaps=PCMP.ns_gaps;
  const pcols={neutral:'#4f46e5',reddit:'#ea580c',school:'#059669',vlog:'#db2777',research:'#4f46e5',academic:'#d97706'};
  const sorted=[...ucs].sort((a,b)=>gaps[b]-gaps[a]);
  const W=500,bh=22,gap=4,lM=90,mr=60,mt=5;
  const pw=W-lM-mr;
  const maxG=Math.max(...Object.values(gaps))*1.15;
  const H=mt+(bh+gap)*sorted.length+5;
  const s=svg(W,H,parent);
  sorted.forEach((uc,i)=>{
    const y=mt+i*(bh+gap);
    const g=gaps[uc];
    const bw=pw*g/maxG;
    S('text',{x:lM-6,y:y+bh/2+3,textAnchor:'end',fill:pcols[uc],fontSize:10,fontFamily:fn,fontWeight:700,text:uc},s);
    S('rect',{x:lM,y,width:Math.max(bw,2),height:bh,fill:pcols[uc],rx:4,fillOpacity:.6},s);
    S('text',{x:lM+bw+6,y:y+bh/2+3,fill:'var(--tx)',fontSize:9,fontFamily:fn,fontWeight:700,text:'+'+g.toFixed(2)},s);
  });
}

const TRAITS=["better_vibes","beutyful_people","cool_people","democratic","interesting_culture","life_expectancy"];
const TL={"better_vibes":"Better Vibes","beutyful_people":"Beautiful People","cool_people":"Cool People","democratic":"Democratic","interesting_culture":"Interesting Culture","life_expectancy":"Life Expectancy"};
const CS=["Australia","Brazil","Canada","China","Czechia","France","India","Indonesia","Japan","Kenya","Nigeria","Peru","Saudi Arabia","Switzerland","United States"];

  sorted.forEach((c,idx)=>{const yO=tM+idx*rowH,isN=NORTH.includes(c),cS=sfData[c]||[];

    if(cS.length>0)S('text',{x:lM-6,y:yO+rowH/2+11,textAnchor:'end',fill:'var(--rd)',fontSize:7,dominantBaseline:'middle',text:'⚡'+cS.length+' sig'},s);
    const barH=7,gap=1,totalH=ucs.length*(barH+gap)-gap,startY=yO+(rowH-totalH)/2;
    ucs.forEach((uc,ui)=>{const d=bcd[trait]?.[c]?.[uc];if(!d)return;const isSig=cS.includes(uc),col=uc_col[uc],y=startY+ui*(barH+gap),ciW=xS(d.hi)-xS(d.lo);
      if(ciW>1)S('rect',{x:xS(d.lo),y:y,width:ciW,height:barH,fill:col,fillOpacity:isSig?.4:.18,rx:barH/2,stroke:col,strokeWidth:isSig?1.2:.4,strokeOpacity:isSig?.9:.4},s);
      S('circle',{cx:xS(d.mu),cy:y+barH/2,r:isSig?4:d.std<0.01?3.5:3,fill:col,stroke:isSig?'var(--wh)':'rgba(0,0,0,.1)',strokeWidth:isSig?1.3:.5},s)})})
}
function drawZTestHM(parent,midx){
  const m=MODELS[midx],data=m.zt;
  const pairs=getModelPairs(m),pL=getModelPairLabels(m),nP=pairs.length;
  const W=820,H=460,lM=120,tM=70;
  const cellW=(W-lM-10)/nP,cellH=(H-tM-10)/6;const s=svg(W,H,parent);
  S('text',{x:lM+(W-lM)/2,y:18,textAnchor:'middle',fill:m.col,fontSize:15,fontFamily:fs,fontWeight:700,text:m.name},s);
  const tot=getModelTotalTests(m),sig=Object.values(data).filter(v=>v.s).length;
  S('text',{x:lM+(W-lM)/2,y:36,textAnchor:'middle',fill:'var(--dm)',fontSize:10,fontFamily:fn,text:sig+'/'+tot+' significant (green = p < 0.05)'},s);
  pL.forEach((p,j)=>S('text',{x:lM+cellW*j+cellW/2,y:tM-12,textAnchor:'middle',fill:'var(--dm)',fontSize:9,fontFamily:fn,fontWeight:600,text:p},s));
  TRAITS.forEach((tr,i)=>{S('text',{x:lM-8,y:tM+cellH*i+cellH/2+4,textAnchor:'end',fill:'var(--tx)',fontSize:12,fontFamily:fs,fontWeight:600,text:TL[tr]},s);
    pairs.forEach((pair,j)=>{const d=data[`${tr}|${pair}`];if(!d)return;const p=d.p;
      const c=p<0.05?'var(--gn)':'var(--dm)';
      S('rect',{x:lM+cellW*j+2,y:tM+cellH*i+2,width:cellW-4,height:cellH-4,rx:5,fill:p<0.05?c:'transparent',fillOpacity:p<0.05?(.35-Math.min(.3,p*5)):0,stroke:c,strokeOpacity:.3,strokeWidth:1},s);
      S('text',{x:lM+cellW*j+cellW/2,y:tM+cellH*i+cellH/2+4,textAnchor:'middle',fill:c,fontSize:11,fontFamily:fn,fontWeight:p<0.05?800:400,text:p<0.001?'<.001':p.toFixed(3)},s)})})
}
function drawNSChart(parent){
  const allUcs=[...new Set(MODELS.flatMap(m=>m.ucs.map(u=>u==='research'?'school':u)))];
  const nUcs=allUcs.length,nM=MODELS.length;
  const W=700,H=360,lM=50,rM=20,tM=40,bM=35,cW=W-lM-rM,cH=H-tM-bM,maxG=6.5;
  const barW=Math.min(22,Math.floor((cW-nUcs*12)/(nUcs*nM))),gapW=2,groupW=barW*nM+gapW*(nM-1)+10;
  const zY=tM+cH/2,yS=v=>tM+cH/2-(v/maxG)*(cH/2);
  const totalW=groupW*nUcs+12*(nUcs-1);const startX=lM+(cW-totalW)/2;const s=svg(W,H,parent);
  S('line',{x1:lM,y1:zY,x2:W-rM,y2:zY,stroke:'var(--bd)',strokeWidth:1.5},s);
  [-6,-4,-2,2,4,6].forEach(v=>{S('line',{x1:lM,y1:yS(v),x2:W-rM,y2:yS(v),stroke:'var(--bd)',strokeWidth:.3,strokeDasharray:'3,3'},s);S('text',{x:lM-5,y:yS(v)+3,textAnchor:'end',fill:'var(--dm)',fontSize:7,fontFamily:fn,text:(v>0?'+':'')+v},s)});
  S('text',{x:lM+6,y:tM+8,fill:'var(--gn)',fontSize:7,fontFamily:fn,text:'↑ North'},s);
  S('text',{x:lM+6,y:H-bM-4,fill:'var(--pk)',fontSize:7,fontFamily:fn,text:'↓ South'},s);
  allUcs.forEach((uc,i)=>{const x=startX+i*(groupW+12);
    MODELS.forEach((m,mi)=>{const ucKey=m.ucs[2]==='research'&&uc==='school'?'research':uc;const g=m.nl[ucKey]?.gap;if(g==null)return;
      const bx=x+mi*(barW+gapW),h=Math.abs(g)/maxG*(cH/2);
      S('rect',{x:bx,y:g>=0?zY-h:zY,width:barW,height:Math.max(h,2),fill:m.col,fillOpacity:.7,rx:2},s);
      S('text',{x:bx+barW/2,y:g>=0?zY-h-4:zY+h+10,textAnchor:'middle',fill:m.col,fontSize:7,fontFamily:fn,fontWeight:800,text:(g>0?'+':'')+g.toFixed(1)},s)});
    S('text',{x:x+groupW/2,y:H-10,textAnchor:'middle',fill:uc_col[uc],fontSize:9,fontFamily:fn,fontWeight:600,text:uc},s)});
  MODELS.forEach((m,i)=>{const x=W-260+i*52;S('rect',{x:x,y:tM-5,width:8,height:8,fill:m.col,rx:2},s);S('text',{x:x+12,y:tM+3,fill:m.col,fontSize:7,fontFamily:fn,text:m.short},s)})
}
function drawVolChart(parent){
  const W=700,rowH=34,lM=115,rM=25,tM=30,maxV=8,cW=W-lM-rM,barH=5,H=tM+CS.length*rowH+20;
  const sorted=[...CS].sort((a,b)=>{const f=c=>MODELS.reduce((s,m)=>s+(m.vl[c]||0),0);return f(b)-f(a)});const s=svg(W,H,parent);
  [0,2,4,6,8].forEach(v=>{S('line',{x1:lM+v/maxV*cW,y1:tM,x2:lM+v/maxV*cW,y2:H-10,stroke:'var(--bd)',strokeWidth:.3},s);S('text',{x:lM+v/maxV*cW,y:tM-5,textAnchor:'middle',fill:'var(--dm)',fontSize:7,fontFamily:fn,text:v},s)});
  sorted.forEach((c,i)=>{const y=tM+i*rowH,isN=NORTH.includes(c);
    S('rect',{x:lM-16,y:y+2,width:8,height:rowH-4,fill:isN?'var(--id)':'var(--or)',fillOpacity:.5,rx:2},s);
    S('text',{x:lM-22,y:y+rowH/2+3,textAnchor:'end',fill:'var(--tx)',fontSize:9,fontFamily:fs,text:c.length>12?c.substring(0,11)+'…':c},s);
    MODELS.forEach((m,mi)=>{S('rect',{x:lM,y:y+1+mi*(barH+1),width:Math.max((m.vl[c]||0)/maxV*cW,1),height:barH,fill:m.col,fillOpacity:.6,rx:2},s)})})
}
function drawConsBars(parent,trait){
  const allUcs=[...new Set(MODELS.flatMap(m=>m.ucs.map(u=>u==='research'?'school':u)))];
  const nUcs=allUcs.length;
  const W=700,barH=10,gap=3,lM=95,maxW=W-lM-90;
  const rowH=(barH+gap)*MODELS.length+10;const H=40+nUcs*rowH;const s=svg(W,H,parent);
  S('text',{x:lM+.5*maxW,y:30,textAnchor:'middle',fill:'var(--rd)',fontSize:7,fontFamily:fn,text:'50%'},s);
  S('text',{x:lM+.8*maxW,y:30,textAnchor:'middle',fill:'var(--gn)',fontSize:7,fontFamily:fn,text:'80%'},s);
  allUcs.forEach((uc,i)=>{const y=40+i*rowH;
    S('text',{x:lM-8,y:y+(barH+gap)*MODELS.length/2,textAnchor:'end',fill:uc_col[uc],fontSize:11,fontFamily:fn,fontWeight:700,text:uc},s);
    MODELS.forEach((m,mi)=>{const ucKey=m.ucs[2]==='research'&&uc==='school'?'research':uc;const v=m.cl[`${ucKey}|${trait}`]||0;const by=y+mi*(barH+gap);
      if(v===0&&!m.ucs.includes(uc)&&!(m.ucs.includes('research')&&uc==='school'))return;
      S('rect',{x:lM,y:by,width:Math.max(v/100*maxW,2),height:barH,fill:m.col,fillOpacity:.6,rx:3},s);
      S('text',{x:lM+v/100*maxW+5,y:by+barH/2+3,fill:cC(v),fontSize:9,fontFamily:fn,fontWeight:700,text:v.toFixed(0)+'%'},s)});
    S('line',{x1:lM+.5*maxW,y1:y-2,x2:lM+.5*maxW,y2:y+(barH+gap)*MODELS.length,stroke:'var(--rd)',strokeWidth:.5,strokeDasharray:'2,2'},s);
    S('line',{x1:lM+.8*maxW,y1:y-2,x2:lM+.8*maxW,y2:y+(barH+gap)*MODELS.length,stroke:'var(--gn)',strokeWidth:.5,strokeDasharray:'2,2'},s)})
}
function drawWBChart(parent){
  const W=700,H=340,lM=135,rM=25,tM=30,cW=W-lM-rM,barH=5,gap=1;
  const sc=v=>Math.max(0,(v-.5)/.5*cW);const s=svg(W,H,parent);
  [.5,.6,.7,.8,.9,1.0].forEach(v=>{S('line',{x1:lM+sc(v),y1:tM,x2:lM+sc(v),y2:H-10,stroke:'var(--bd)',strokeWidth:.3},s);S('text',{x:lM+sc(v),y:tM-4,textAnchor:'middle',fill:'var(--dm)',fontSize:7,fontFamily:fn,text:v.toString()},s)});
  TRAITS.forEach((tr,i)=>{const y=tM+4+i*50;
    S('text',{x:lM-6,y:y+20,textAnchor:'end',fill:'var(--tx)',fontSize:9,fontFamily:fs,fontWeight:600,text:TL[tr]},s);
    MODELS.forEach((m,mi)=>{const w=m.a1[tr].w,b=m.a1[tr].b;const by=y+mi*(barH*2+gap*2+2);
      S('rect',{x:lM,y:by,width:sc(w),height:barH,fill:m.col,fillOpacity:.7,rx:2},s);
      S('text',{x:lM+sc(w)+3,y:by+barH-1,fill:m.col,fontSize:5,fontFamily:fn,fontWeight:700,text:w.toFixed(3)+' w'},s);
      S('rect',{x:lM,y:by+barH+gap,width:sc(b),height:barH,fill:m.col,fillOpacity:.35,rx:2},s);
      S('text',{x:lM+sc(b)+3,y:by+barH+gap+barH-1,fill:m.col,fontSize:5,fontFamily:fn,fontWeight:700,text:b.toFixed(3)+' b'},s)})})
}

function buildOverview(el){
  const sigCounts=MODELS.map(m=>Object.values(m.zt).filter(v=>v.s).length);
  const consAvgs=MODELS.map(m=>{const v=Object.values(m.cl);return(v.reduce((s,x)=>s+x,0)/v.length).toFixed(1)});
  el.innerHTML=`
  <div class="guide"><strong>Overview:</strong> Top metrics show each model's AB/BA consistency (how often the same country wins regardless of question order) and significance count (how many persona pairs produce statistically different country preferences). Higher consistency = less positional bias. More significant pairs = the model's rankings change depending on who it's pretending to be.</div>
  <div class="grid g4" style="margin-bottom:12px">${MODELS.map((m,i)=>met(consAvgs[i]+'%',m.name,m.col,'AB/BA consistency')).join('')}</div>
  <div class="grid g4" style="margin-bottom:22px">${MODELS.map((m,i)=>{const tot=getModelTotalTests(m);return met(sigCounts[i]+'/'+tot,m.short+' Sig',m.col,'z-test p<.05')}).join('')}</div>
  ${sec('Key Findings')}<div class="grid g2" style="margin-bottom:20px">
    ${[{t:'Persona sensitivity is pervasive',d:'Llama 70B: 43/60 persona pairs are statistically significant. Mistral Small: 36/60. Persona effects are pervasive across architectures.',c:'#1d4ed8'},
       {t:'Larger models are more persona-sensitive',d:'Qwen 30B MoE: 35/60 sig. Llama 8B: 22/60. MoE produces fewer significant shifts than Llama 70B (43) or Mistral (36), but more than the smaller dense model.',c:'var(--pk)'},
       {t:'Size affects consistency, not significance',d:'AB/BA: L70=81.6%, L8B=75.8%, Mistral=73.5%, Qwen=70.0%. More consistent models (L70) still show high persona sensitivity (43/60 sig). Noise ≠ persona sensitivity.',c:'var(--am)'},
       {t:'Factual firewall is architecture-dependent',d:'Life Expectancy: Qwen=0/10, L8B=1/10, L70=4/10, Mistral=4/10. The factual firewall is weakest in larger models — Llama 70B and Mistral leak on factual traits as much as subjective ones.',c:'var(--gn)'}
    ].map(f=>`<div class="finding" style="border-left-color:${f.c}"><div class="ft" style="color:${f.c}">${f.t}</div><div class="fd">${f.d}</div></div>`).join('')}
  </div></div>`;
}
function buildDistributions(el){
  el.innerHTML=`<div class="guide"><strong>Distributions:</strong> Each horizontal bar shows a country's 95% confidence interval for its rank on a given trait. Select a model and trait to compare how different personas (colored bars) rank countries. Overlapping bars = no significant difference. When bars separate, that persona genuinely shifts how the model ranks that country. Scroll horizontally on mobile to see all data.</div>
  <div id="dp" style="margin-bottom:12px"></div><div id="dt"></div><div id="dl"></div>
  <div class="box"><div class="label" id="dlb"></div><div id="dc"></div></div>
  ${call('var(--dm)','How to read','Each colored bar = 95% CI (mean ± t×SE, t-distribution, 10 repeats). Dot = mean rank. Red ⚡ = Welch t-test p<0.05 between persona pairs.')}`;
  document.getElementById('dp').appendChild(modelPills(curModelIdx,i=>{curModelIdx=i;render()}));
  document.getElementById('dt').appendChild(traitPills(curTrait,t=>{curTrait=t;render()}));
  const m=MODELS[curModelIdx];
  document.getElementById('dl').innerHTML=legend(m.ucs.map(uc=>[ucName(uc),uc_col[uc]]).concat([['⚡sig','var(--rd)']]));
  document.getElementById('dlb').textContent=m.name+' · 95% CI · '+TL[curTrait];
  drawDistView(document.getElementById('dc'),curTrait,curModelIdx);
}
function buildSignificance(el){
  el.innerHTML=`<div class="guide"><strong>Significance Tests:</strong> Each heatmap shows p-values for persona pair comparisons per trait. Green cells (p < 0.05) indicate the model produces statistically different country rankings under those two personas. More green = the model is more sensitive to persona framing. Scroll horizontally to see all persona pairs.</div>
  ${sec('Decision-Level Significance Tests')}
  <div class="box" style="margin-bottom:16px"><div class="label">Two-proportion z-test on pairwise decisions</div>
    <div style="font-size:11px;color:var(--dm);line-height:1.7">For each trait × persona pair: match 525 identical decisions across personas and count disagreements. Compare against within-persona baseline (2,100 pairs). One-sided z-test: H₁ = persona causes more disagreement than noise. Green = p < 0.05.</div></div>
  ${MODELS.map((_,i)=>`<div class="box" style="margin-bottom:10px" id="sz${i}"></div>`).join('')}</div>
  ${MODELS.map(m=>{const sig=Object.values(m.zt).filter(v=>v.s).length;const tot=getModelTotalTests(m);return call(m.col,m.name+': '+sig+'/'+tot+' significant','')}).join('')}
  ${sec('Within vs Between Persona ρ')}<div class="box" id="swb"></div>${legend(MODELS.map(m=>[m.short+' w/b',m.col]))}</div>`;
  MODELS.forEach((m,i)=>drawZTestHM(document.getElementById('sz'+i),i));
  drawWBChart(document.getElementById('swb'));
}
function buildNS(el){
  el.innerHTML=`<div class="guide"><strong>North–South Gap:</strong> Measures whether models systematically favour Northern/Western countries (positive gap) or Southern/Global South countries (negative gap) on subjective traits. Each bar shows the average rank difference between North and South country groups per persona. Tables below show the raw rank values. A consistent positive gap across personas suggests embedded geographic bias.</div>
  ${sec('The North-South Gap','Positive = North favoured. Negative = South favoured.')}<div class="box" id="nsc"></div></div>
  ${call('var(--pk)','Four models, multiple directions','Same architecture at different temperatures produces similar N-S gaps. Qwen inverts it. Architecture > temperature > size.')}
  ${sec('Absolute Ranks')}<div class="grid g2" style="gap:10px">
  ${MODELS.map(m=>`<div class="box"><div class="label">${m.name}</div><table><thead><tr>${['Persona','North','South','Gap'].map(h=>`<th style="text-align:center;font-size:9px">${h}</th>`).join('')}</tr></thead><tbody>
  ${m.ucs.map(uc=>{const x=m.nl[uc]||{};return`<tr><td style="text-align:center;color:${uc_col[uc]};font-weight:700;font-size:10px">${ucName(uc)}</td><td style="text-align:center;color:var(--id)">${x.north}</td><td style="text-align:center;color:var(--or)">${x.south}</td><td style="text-align:center;color:${x.gap>0?'var(--rd)':x.gap<-1?'var(--gn)':'var(--am)'};font-weight:800">${x.gap>0?'+':''}${x.gap}</td></tr>`}).join('')}
  </tbody></table></div>`).join('')}</div></div>`;
  drawNSChart(document.getElementById('nsc'));
}
function buildConsistency(el){
  el.innerHTML=`<div class="guide"><strong>AB/BA Consistency:</strong> When asked "Is A better than B?" vs "Is B better than A?", a perfectly consistent model gives the same answer. Values near 50% = coin flip (high positional bias). Near 100% = very consistent. The bar chart compares models per trait; the matrix shows every persona × trait cell. Red cells flag high positional bias.</div>
  ${sec('AB/BA Consistency','Red=50%, Green=80%.')}<div id="cp"></div><div class="box" id="cb"></div>${legend(MODELS.map(m=>[m.short,m.col]))}</div>
  ${sec('Full Matrix')}<div class="grid g2" style="gap:10px">
  ${MODELS.map(m=>`<div class="box"><div class="label">${m.name}</div><table><thead><tr><th></th>${TRAITS.map(t=>`<th style="text-align:center;font-size:6px">${TL[t].split(' ')[0]}</th>`).join('')}</tr></thead><tbody>
  ${m.ucs.map(uc=>`<tr><td style="color:${uc_col[uc]};font-weight:700;font-size:9px">${ucName(uc)}</td>${TRAITS.map(t=>{const v=m.cl[`${uc}|${t}`]||0;return`<td style="text-align:center;font-weight:600;font-size:9px;color:${cC(v)};background:${v<50?'rgba(185,28,28,.08)':v>=90?'rgba(4,120,87,.06)':'transparent'}">${v>0?v.toFixed(0):'-'}</td>`}).join('')}</tr>`).join('')}
  </tbody></table></div>`).join('')}</div></div>`;
  document.getElementById('cp').appendChild(traitPills(curTrait,t=>{curTrait=t;render()}));
  drawConsBars(document.getElementById('cb'),curTrait);
}
function buildSubjectivity(el){
  el.innerHTML=`<div class="guide"><strong>Subjectivity Gradient:</strong> Traits are split into factual (Democratic, Life Expectancy) and subjective (Vibes, Beauty, Cool, Culture). Each cell shows how many persona pairs produce significant ranking differences for that trait × model. Factual traits should resist persona influence (fewer significant pairs). If factual traits show green, the model's "factual firewall" is leaking — personas are changing objective rankings.</div>
  ${sec('The Subjectivity Gradient')}
  <div class="box"><table><thead><tr><th style="text-align:left">Trait</th><th style="text-align:left">Type</th>${MODELS.map(m=>`<th style="text-align:center;font-size:8px;color:${m.col}">${m.short}</th>`).join('')}</tr></thead><tbody>
  ${TRAITS.map(t=>{const isFact=t==='democratic'||t==='life_expectancy';
    return`<tr style="background:${isFact?'rgba(67,56,202,.05)':'transparent'}"><td style="font-weight:700">${TL[t]}</td><td style="color:${isFact?'var(--id)':'var(--or)'};font-weight:700;font-size:9px">${isFact?'FACT':'SUBJ'}</td>
      ${MODELS.map(m=>{const ppt=getModelPairsPerTrait(m);const n=Object.entries(m.zt).filter(([k,v])=>k.startsWith(t+'|')&&v.s).length;return`<td style="text-align:center;color:${n>=ppt*.8?'var(--gn)':n>0?'var(--am)':'var(--rd)'};font-weight:800;font-size:14px">${n}/${ppt}</td>`}).join('')}</tr>`}).join('')}
  </tbody></table></div></div>
  ${call('var(--am)','Architecture > Temperature > Size','L70 produces 43/60 significant pairs — the most of any model. Mistral: 36/60. Qwen MoE: 35/60. L8B: 22/60. Larger models show more persona sensitivity, not less. The factual firewall is architecture-dependent but does not simply scale with size.')}`;
}
function buildCountries(el){
  el.innerHTML=`<div class="guide"><strong>Country Volatility:</strong> Shows how much each country's rank changes across personas on subjective traits. Longer bars = more volatile (the model treats that country very differently depending on persona). Blue markers = Northern countries, orange = Southern. Countries in the middle of the table tend to be more volatile than those consistently at the top or bottom.</div>
  ${sec('Country Volatility','Avg rank spread across personas (subjective traits).')}
  <div class="box" id="cv"></div>${legend(MODELS.map(m=>[m.short,m.col]).concat([['North','var(--id)'],['South','var(--or)']]))}</div>`;
  drawVolChart(document.getElementById('cv'));
}
render();
</script>
</body>
