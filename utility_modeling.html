<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Against Monolithic Utility — v5</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f8fa;--c1:#ffffff;--bd:#cdd3de;--tx:#2d3340;--dm:#6b7588;--wh:#111827;--rd:#b91c1c;--am:#b45309;--gn:#047857;--id:#4338ca;--or:#9a3412;--pk:#9d174d}
body{background:var(--bg);color:var(--tx);font-family:'Instrument Sans',system-ui,sans-serif;min-height:100vh;padding:20px 16px;-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:26px;font-weight:800;color:var(--wh);letter-spacing:-.5px}
h3{font-size:15px;font-weight:700;color:var(--wh);margin-bottom:4px}
.sub{font-size:12px;color:var(--dm);margin-top:4px;line-height:1.5}
.desc{font-size:11.5px;color:var(--dm);margin-bottom:12px;line-height:1.5}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.met{background:var(--c1);border:1px solid var(--bd);border-radius:10px;padding:14px 10px;text-align:center;border-top:3px solid var(--id)}
.met .v{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.met .l{font-size:10.5px;font-weight:600;color:var(--tx);margin-top:3px}
.met .s{font-size:9px;color:var(--dm);margin-top:2px}
.sec{margin-bottom:26px}
.box{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:12px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.box .label{font-size:10px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-family:'IBM Plex Mono',monospace}
.call{border-radius:8px;padding:14px 18px;margin-bottom:16px}
.call .ct{font-size:13px;font-weight:700;margin-bottom:5px}
.call .cd{font-size:11.5px;color:var(--dm);line-height:1.65}
.finding{border-radius:8px;padding:13px 16px;border-left:3px solid var(--id)}
.finding .ft{font-size:11.5px;font-weight:700;margin-bottom:5px}
.finding .fd{font-size:10.5px;color:var(--dm);line-height:1.55}
table{border-collapse:collapse;width:100%;font-size:10px}
th{padding:5px 6px;color:var(--dm);border-bottom:2px solid var(--bd);text-align:left;font-size:9px;font-family:'IBM Plex Mono',monospace}
td{padding:4px 6px;border-bottom:1px solid var(--bd)}
svg{display:block}
.pills{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:500;border:1px solid var(--bd);background:var(--c1);color:var(--dm);transition:all .15s;white-space:nowrap}
.pill.on{border:2px solid var(--id);background:rgba(67,56,202,.07);color:var(--id);font-weight:700}
.leg{display:flex;gap:12px;font-size:10px;margin-bottom:8px;flex-wrap:wrap}
.leg .li{display:flex;align-items:center;gap:5px;font-weight:600;font-family:'IBM Plex Mono',monospace}
.leg .li .dot{width:10px;height:10px;border-radius:2px}
.stats{display:flex;gap:16px;margin-bottom:8px;font-size:10px;font-family:'IBM Plex Mono',monospace}
.footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--bd);font-size:9px;color:var(--dm);text-align:center;font-family:'IBM Plex Mono',monospace}
.guide{background:var(--c2);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:11.5px;color:var(--tx);line-height:1.65;border-left:3px solid var(--id)}
.guide strong{color:var(--wh)}
.mtabs{display:flex;gap:0;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.mtab{flex:1;padding:12px 16px;cursor:pointer;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;background:var(--c1);color:var(--dm);border:none;transition:all .2s;position:relative}
.mtab:not(:last-child){border-right:1px solid var(--bd)}
.mtab.on{background:rgba(67,56,202,.08);color:var(--id)}
.mtab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--id)}
.mtab .mn{font-size:13px;font-weight:700;display:block;margin-bottom:2px}
.mtab .ms{font-size:9px;font-weight:400;opacity:.7}
@media(max-width:600px){
  body{padding:12px 8px}
  h1{font-size:20px}
  h3{font-size:13px}
  .sub{font-size:10px}
  .desc{font-size:10.5px}
  .g4,.g5{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .met .v{font-size:20px}
  .met .l{font-size:9px}
  .met{padding:10px 6px}
  .mtab{padding:9px 8px;font-size:9px}
  .pill{padding:5px 8px;font-size:9px}
  .box{padding:10px 8px}
  .call{padding:10px 12px}
  .call .ct{font-size:12px}
  .call .cd{font-size:10.5px}
  .finding .ft{font-size:11px}
  .finding .fd{font-size:10px}
  .stats{font-size:9px;gap:10px}
  table{font-size:9px}
  th{font-size:8px}
  .guide{font-size:10.5px;padding:10px 12px}
}
</style>
</head>

function drawMuDist(el,items,showSigma){
  el.innerHTML="";
  var OD=M().OD,BOOT=M().BOOT;
  var gMin=Infinity,gMax=-Infinity;
  for(var i=0;i<items.length;i++){
    var oi=OD.indexOf(items[i]);
    if(oi<0) continue;
    for(var j=0;j<nUC;j++){
      var u=UC[j];
      var lo=BOOT.lo[u][oi],hi=BOOT.hi[u][oi];
      if(lo<gMin) gMin=lo;
      if(hi>gMax) gMax=hi;
      if(showSigma){
        var slo=items[i].mu[u]-items[i].si[u];
        var shi=items[i].mu[u]+items[i].si[u];
        if(slo<gMin) gMin=slo;
        if(shi>gMax) gMax=shi;
      }
    }
  }
  gMin=Math.floor(gMin-0.5); gMax=Math.ceil(gMax+0.5);
  var W=800,rowH=36,lM=155,rM=18,tM=28,cW=W-lM-rM;
  function xS(v){return lM+((v-gMin)/(gMax-gMin))*cW;}
  var H=tM+items.length*rowH+8;
  var s=mkSvg(W,H);
  for(var v=Math.ceil(gMin);v<=Math.floor(gMax);v++){
    S(s,"line",{x1:xS(v),y1:tM-3,x2:xS(v),y2:H-4,stroke:"#cdd3de",strokeWidth:0.5});
    S(s,"text",{x:xS(v),y:tM-7,textAnchor:"middle",fill:"#6b7588",fontSize:8,fontFamily:fn,text:String(v)});
  }
  if(gMin<0&&gMax>0) S(s,"line",{x1:xS(0),y1:tM-3,x2:xS(0),y2:H-4,stroke:"#6b7588",strokeWidth:1,strokeDasharray:"3,3"});
  for(var idx=0;idx<items.length;idx++){
    var item=items[idx];
    var oi=OD.indexOf(item);
    if(oi<0) continue;
    var yO=tM+idx*rowH;
    var cc=CAT_COL[item.c]||"#4f46e5";

    if(isSig) S(s,"rect",{x:lM-3,y:yO,width:cW+6,height:rowH,fill:"rgba(185,28,28,.06)",rx:3});
    S(s,"rect",{x:5,y:yO+rowH/2-4,width:6,height:8,rx:2,fill:cc,fillOpacity:0.7});
    S(s,"text",{x:lM-8,y:yO+rowH/2+1,textAnchor:"end",fill:isSig?"#dc2626":"#2d3340",fontSize:9,fontFamily:fs,fontWeight:isSig?700:500,dominantBaseline:"middle",text:item.t});
    if(isSig){
      var pv=BOOT.p[oi];
      S(s,"text",{x:lM-8,y:yO+rowH/2+11,textAnchor:"end",fill:"#dc2626",fontSize:7,dominantBaseline:"middle",text:pv<0.001?"⚡p<.001":"⚡p="+pv.toFixed(3)});
    }
    var barH=5,gap=1.2,totalH=nUC*(barH+gap)-gap,startY=yO+(rowH-totalH)/2;
    for(var ui=0;ui<nUC;ui++){
      var uc=UC[ui],mu=item.mu[uc],sig=item.si[uc],col=UCL[uc],y=startY+ui*(barH+gap);
      var lo=BOOT.lo[uc][oi],hi=BOOT.hi[uc][oi];
      if(showSigma&&sig>0.05){
        var slo=mu-sig,shi=mu+sig,xSlo=Math.max(xS(slo),lM),xShi=Math.min(xS(shi),lM+cW),sw=xShi-xSlo;
        if(sw>2) S(s,"rect",{x:xSlo,y:y,width:sw,height:barH,fill:col,fillOpacity:0.06,rx:barH/2,stroke:col,strokeWidth:0.3,strokeOpacity:0.12,strokeDasharray:"2,2"});
      }

      if(ciW>1) S(s,"rect",{x:xLo,y:y,width:ciW,height:barH,fill:col,fillOpacity:isSig?0.4:0.2,rx:barH/2,stroke:col,strokeWidth:isSig?1:0.5,strokeOpacity:isSig?0.8:0.4});
      S(s,"circle",{cx:Math.max(lM,Math.min(lM+cW,xS(mu))),cy:y+barH/2,r:isSig?3.5:2.8,fill:col,stroke:isSig?"#111827":"rgba(0,0,0,0.1)",strokeWidth:isSig?1.2:0.5});
    }
  }

function drawValChart(el,title,items,keyFn,xMin,xMax,unit,gridStep,logScale){
  el.innerHTML="";
  var box=document.createElement("div"); box.className="box";
  var lbl=document.createElement("div"); lbl.className="label"; lbl.textContent=title; box.appendChild(lbl);
  var container=document.createElement("div"); container.style.overflowX="auto";
  function tx(v){return logScale?(v<=0?0:Math.log10(v)):v;}
  var xMn=logScale?Math.log10(Math.max(xMin,1)):xMin;
  var xMx=logScale?Math.log10(xMax):xMax;
  var W=800,rowH=40,lM=120,rM=30,tM=28,cW=W-lM-rM;
  function xS(v){return lM+((tx(v)-xMn)/(xMx-xMn))*cW;}
  var H=tM+items.length*rowH+8;
  var s=mkSvg(W,H);
  if(logScale){
    var ticks=[1e3,1e4,1e5,1e6,1e7,1e8];
    for(var ti=0;ti<ticks.length;ti++){
      var v=ticks[ti];
      if(tx(v)>=xMn&&tx(v)<=xMx){
        S(s,"line",{x1:xS(v),y1:tM-3,x2:xS(v),y2:H-4,stroke:"#cdd3de",strokeWidth:0.5});
        var lb=v>=1e6?"$"+v/1e6+"M":"$"+v/1e3+"K";
        S(s,"text",{x:xS(v),y:tM-7,textAnchor:"middle",fill:"#6b7588",fontSize:8,fontFamily:fn,text:lb});
      }
    }
  } else {
    for(var v=Math.ceil(xMin/gridStep)*gridStep;v<=xMax;v+=gridStep){
      S(s,"line",{x1:xS(v),y1:tM-3,x2:xS(v),y2:H-4,stroke:"#cdd3de",strokeWidth:v===0?0.8:0.5,strokeDasharray:v===0?"3,3":"none"});
      var lb=unit==="×"?(v%1===0?v.toFixed(0):v.toFixed(1))+"×":"$"+v;
      S(s,"text",{x:xS(v),y:tM-7,textAnchor:"middle",fill:"#6b7588",fontSize:8,fontFamily:fn,text:lb});
    }
  }
  for(var idx=0;idx<items.length;idx++){
    var item=items[idx],yO=tM+idx*rowH,label=keyFn(item);
    S(s,"rect",{x:0,y:yO,width:W,height:rowH,fill:idx%2===0?"#f0f1f4":"transparent"});
    var cis=[],anyNO=false;
    for(var ui=0;ui<nUC;ui++){if(item[UC[ui]])cis.push(item[UC[ui]]);}
    for(var a=0;a<cis.length&&!anyNO;a++){for(var b=a+1;b<cis.length;b++){if(cis[a].hi<cis[b].lo||cis[b].hi<cis[a].lo){anyNO=true;break;}}}
    if(anyNO) S(s,"rect",{x:lM-3,y:yO,width:cW+6,height:rowH,fill:"rgba(185,28,28,.06)",rx:3});
    S(s,"text",{x:lM-8,y:yO+rowH/2+1,textAnchor:"end",fill:anyNO?"#dc2626":"#2d3340",fontSize:10,fontFamily:fs,fontWeight:anyNO?700:500,dominantBaseline:"middle",text:label});
    var barH=5.5,gap=1.2,totalH=nUC*(barH+gap)-gap,startY=yO+(rowH-totalH)/2;
    for(var ui=0;ui<nUC;ui++){
      var ci=item[UC[ui]]; if(!ci) continue;
      var col=UCL[UC[ui]],y=startY+ui*(barH+gap);
      var lo=logScale?Math.max(ci.lo,1):ci.lo,hi=ci.hi,pt=logScale?Math.max(ci.pt,1):ci.pt;
      var x1=Math.max(xS(lo),lM),x2=Math.min(xS(hi),lM+cW),xPt=Math.max(lM,Math.min(lM+cW,xS(pt))),ciW=x2-x1;
      if(ciW>1) S(s,"rect",{x:x1,y:y,width:ciW,height:barH,fill:col,fillOpacity:anyNO?0.4:0.2,rx:barH/2,stroke:col,strokeWidth:anyNO?1:0.5,strokeOpacity:anyNO?0.8:0.4});
      S(s,"circle",{cx:Math.max(lM,Math.min(lM+cW,xPt)),cy:y+barH/2,r:anyNO?4:3,fill:col,stroke:anyNO?"#111827":"rgba(0,0,0,0.1)",strokeWidth:anyNO?1.2:0.5});
    }
    var pts=[];for(var ui=0;ui<nUC;ui++){var p=item[UC[ui]];if(p&&p.pt>0)pts.push(p.pt);}
    if(pts.length>=2){var shift=Math.max.apply(null,pts)/Math.min.apply(null,pts);
      if(shift>1.01) S(s,"text",{x:W-4,y:yO+rowH/2+1,textAnchor:"end",fill:shift>=1.5?"#dc2626":"#d97706",fontSize:8,fontFamily:fn,fontWeight:700,dominantBaseline:"middle",text:shift.toFixed(1)+"×"});}
  }
  for(var ui=0;ui<nUC;ui++){
    var x=W-260+ui*50,y=tM-4;
    S(s,"rect",{x:x,y:y-4,width:8,height:8,fill:UCL[UC[ui]],rx:2});
    S(s,"text",{x:x+12,y:y+1,fill:UCL[UC[ui]],fontSize:7,fontFamily:fn,fontWeight:600,text:UL[UC[ui]]});
  }
  container.appendChild(s); box.appendChild(container); el.appendChild(box);
}


function pairwiseTable(){
  var D=M().D,pw=D.pairwise;
  // Build matrix from pairs
  var ucs=UC.slice(),mat={},mats={},matm={},matc={};
  for(var i=0;i<ucs.length;i++){mat[ucs[i]]={};mats[ucs[i]]={};matm[ucs[i]]={};matc[ucs[i]]={};for(var j=0;j<ucs.length;j++){mat[ucs[i]][ucs[j]]=i===j?1.0:0;mats[ucs[i]][ucs[j]]=i===j?'—':0;matm[ucs[i]][ucs[j]]=i===j?0:0;matc[ucs[i]][ucs[j]]=i===j?0:0;}}
  for(var p=0;p<pw.length;p++){var d=pw[p];mat[d.a][d.b]=d.rho;mat[d.b][d.a]=d.rho;mats[d.a][d.b]=d.swap_pct;mats[d.b][d.a]=d.swap_pct;matm[d.a][d.b]=d.mad;matm[d.b][d.a]=d.mad;matc[d.a][d.b]=d.ci_diff;matc[d.b][d.a]=d.ci_diff;}
  var h='<table><thead><tr><th style="font-size:8px">ρ / swaps% / MAD</th>';
  for(var i=0;i<ucs.length;i++){h+='<th style="text-align:center;color:'+UCL[ucs[i]]+'">'+UL[ucs[i]]+'</th>';}
  h+='</tr></thead><tbody>';
  for(var i=0;i<ucs.length;i++){
    h+='<tr><td style="font-weight:700;color:'+UCL[ucs[i]]+'">'+UL[ucs[i]]+'</td>';
    for(var j=0;j<ucs.length;j++){
      if(i===j){h+='<td style="text-align:center;color:#6b7588;font-family:'+fn+'">—</td>';continue;}
      var rho=mat[ucs[i]][ucs[j]],sw=mats[ucs[i]][ucs[j]],mad=matm[ucs[i]][ucs[j]],ci=matc[ucs[i]][ucs[j]];
      var rc=rho>=0.99?'#059669':rho>=0.97?'#d97706':'#dc2626';
      if(i<j){
        h+='<td style="text-align:center;font-family:'+fn+';font-size:9px;line-height:1.5"><span style="font-weight:700;color:'+rc+'">'+rho.toFixed(3)+'</span><br><span style="color:#6b7588;font-size:8px">'+sw+'% swap · Δ'+mad+'</span>'+(ci>0?'<br><span style="color:#dc2626;font-size:7px">'+ci+' rank CI≠</span>':'')+'</td>';
      } else {
        h+='<td style="text-align:center;font-family:'+fn+';font-size:9px;color:#6b7588">'+rho.toFixed(3)+'</td>';
      }
    }
    h+='</tr>';
  }
  return h+'</tbody></table>';
}


function catPairwiseTable(){

function regionTable(){
  var D=M().D;
  var rr=D.rg.ranks,rl=D.rg.rel_ranks,regions=Object.keys(rr[UC[0]]);
  regions.sort(function(a,b){
    var va=UC.map(function(u){return rr[u][a];}),vb=UC.map(function(u){return rr[u][b];});
    return(Math.max.apply(null,vb)-Math.min.apply(null,vb))-(Math.max.apply(null,va)-Math.min.apply(null,va));
  });
  var colMin={};
  for(var i=0;i<nUC;i++){var u=UC[i];var mn=Infinity;for(var ri=0;ri<regions.length;ri++){var v=rr[u][regions[ri]];if(v<mn)mn=v;}colMin[u]=mn;}
  var h='<table><thead><tr><th>Region</th>';
  for(var i=0;i<nUC;i++) h+='<th style="text-align:center;color:'+UCL[UC[i]]+'">'+UL[UC[i]]+'</th>';
  h+='<th style="text-align:center">Δ</th></tr></thead><tbody>';
  for(var ri=0;ri<regions.length;ri++){
    var r=regions[ri],absRks=UC.map(function(u){return rr[u][r];}),relRks=UC.map(function(u){return rl[u][r];});
    var range=Math.max.apply(null,absRks)-Math.min.apply(null,absRks);
    var name=r.length>25?r.substring(0,22)+"…":r;
    h+='<tr><td style="font-weight:600;color:#111827">'+name+'</td>';
    for(var j=0;j<absRks.length;j++){
      var rk=absRks[j],rel=relRks[j],u=UC[j],isBest=rk===colMin[u];
      h+='<td style="text-align:center;font-family:'+fn+';color:'+(isBest?'#d97706':rk<=colMin[u]+2?'#059669':'#2d3340')+'"><span style="font-weight:'+(isBest?800:600)+'">#'+rk+'</span> <span style="font-size:8px;opacity:0.55">('+rel+')</span></td>';
    }
    h+='<td style="text-align:center;font-weight:800;font-family:'+fn+';color:'+(range>=6?'#dc2626':range>=3?'#d97706':'#6b7588')+'">'+range+'</td></tr>';
  }
  return h+'</tbody></table>';
}

    '<div class="g4">'+met(D.rv.p+"%","Preference reversals","#dc2626",D.rv.t+"/'+B.n_p+' edges")+met(D.xr.mn+"×","Exchange rate shift","#dc2626","mean max/min")+met(BOOT.nSig+"/"+B.n_st,"Sig. outcomes (rank CI)","#d97706","rank CIs non-overlapping")+met(B.min_rho,"Worst pairwise ρ","#059669",B.worst_pair)+'</div>'+

    '<div class="call" style="background:rgba(185,28,28,.04);border:1px solid rgba(185,28,28,.12);margin-bottom:20px"><div class="ct" style="color:#dc2626">Thesis</div><div class="cd">The paper claims LLMs have stable, monolithic utility functions. This audit of <strong style="color:#111827">'+B.label+'</strong>: <strong style="color:#111827">'+B.n_o+' outcomes</strong>, <strong style="color:#111827">'+B.n_r+' repeats</strong>, <strong style="color:#111827">all '+B.n_p+' pairs</strong>, <strong style="color:#111827">5 framings</strong> ('+B.n_vk+'K calls). Pairwise ranking agreement is high (ρ='+B.min_rho+'–'+B.max_rho+'), but <strong style="color:#dc2626">cardinal exchange rates shift '+B.xr_mn+'×</strong> and <strong style="color:#dc2626">'+B.rv_p+'% of preferences reverse</strong>.</div></div>'+

    '<div class="sec"><h3>Rank Distributions</h3><p class="desc">Each row = one outcome. Rank view: dots show each framing\'s rank with 95% CI bars (bootstrap). µ view: Thurstonian score with 95% CI. Red ⚡ = significantly different across framings. Highlighted rows have non-overlapping rank CIs — the framing genuinely changes where this outcome sits in the ranking.</p>'+
    '<div class="pills" id="catPills"></div><div class="pills" id="viewPills"></div>'+
    '<div class="leg">'+UC.map(function(u){return '<div class="li"><div class="dot" style="background:'+UCL[u]+'"></div><span style="color:'+UCL[u]+'">'+UL[u]+'</span></div>';}).join("")+'<div class="li"><div class="dot" style="background:rgba(185,28,28,.25);border:1px solid rgba(185,28,28,.4)"></div><span style="color:#dc2626">⚡sig (p<0.05)</span></div></div>'+
    '<div class="stats"><span style="color:var(--dm)">Showing: <strong style="color:#111827">'+filtered.length+'</strong></span><span style="color:#dc2626">Sig (p<0.05): <strong>'+nSigFiltered+'</strong></span><span style="color:#34d399">Stable: <strong>'+(filtered.length-nSigFiltered-nAnchor)+'</strong></span><span style="color:#fbbf24">Mean Δrank: <strong>'+avg+'</strong></span></div>'+
    '<div class="box"><div class="label">'+(curView==="rank"?"Rank (1→'+B.n_o+') · 95% CI from parametric bootstrap":"Thurstonian µ · 95% CI")+' · '+(curCat==="All"?"all":curCat)+'</div><div id="mainChart"></div></div></div>'+

    '<div class="sec"><h3>Regional Preference Shift</h3><div class="guide">Shows where "1 preventable death averted" in each world region ranks among all outcomes. If the model had a stable utility function, regional rankings would be identical across framings. Shifts reveal that whose life the model values most depends on persona framing.</div><p class="desc">Absolute rank (#N/'+B.n_o+') and relative rank (N/7) of each region’s \"1 preventable death averted\" — whose life matters most changes with framing.</p><div class="box">'+regionTable()+'</div><div class="g2"><div class="finding" style="border-left-color:#dc2626;background:rgba(185,28,28,.04);border:1px solid rgba(185,28,28,.12)"><div class="ft" style="color:#dc2626">Top region shifts across framings</div><div class="fd">The highest-ranked death-aversion region and its absolute position among all outcomes vary by framing.</div></div><div class="finding" style="border-left-color:#fbbf24;background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.15)"><div class="ft" style="color:#fbbf24">Human life W = '+B.cat_w_life+'</div><div class="fd">Self-pres W='+B.cat_w_self+', World W='+B.cat_w_world+'.</div></div></div></div>'+

    '<div class="sec"><h3>Exchange Rate Instability</h3><div class="guide">Exchange rates measure how many units of one outcome equal one unit of another. If these shift >2× across framings, the model's cardinal preferences (not just ordinal rankings) are framing-dependent. Higher shifts = less stable utility.</div><p class="desc">'+Math.round(100*D.xr.g2/D.xr.n)+'% of exchange rates shift &gt;2× across framings.</p><div class="g5">'+Object.keys(D.xr.d).map(function(k){var v=D.xr.d[k];var c=k.indexOf("5.0")>=0?"#dc2626":k.indexOf("3.0")>=0?"#ea580c":k.indexOf("2.0")>=0?"#d97706":"#4f46e5";return met(v,k,c,Math.round(100*v/D.xr.n)+"%");}).join("")+'</div></div>'+

    '<div class="sec"><h3>Implied Monetary Valuations</h3><div class="guide">Each outcome's value is expressed as a ratio to $100M. Non-overlapping confidence intervals across framings mean the model assigns statistically different dollar values depending on persona. Animal valuations use standardised counts (100 each) for fair comparison across species.</div><p class="desc">Exchange rate = µ(outcome)/µ($100M). 95% CI scaled to |ratio|× repeats via delta method — a 100× exchange rate assumes 100× more samples than a 2× rate. Where CIs don’t overlap, the price is framing-dependent.</p>'+
    '<div id="valDeaths"></div><div id="valYears"></div><div id="valAnimals"></div><div id="valSP"></div><div id="valWorld"></div>'+
    '<div class="finding" style="border-left-color:#dc2626;background:rgba(185,28,28,.04);border:1px solid rgba(185,28,28,.12);margin-top:8px"><div class="ft" style="color:#dc2626">Central claim visualized</div><div class="fd">Non-overlapping CIs = statistically significant framing dependence. With standardized animal counts (100 each), per-animal valuations are directly comparable across species.</div></div></div>'+

    '<div class="sec"><h3>Pairwise Ranking Agreement</h3><div class="guide">Spearman ρ measures how similar two framings' complete rankings are (ρ=1.0 = identical). Swap % = how many outcome pairs reverse order. MAD = average rank position change. High ρ with non-zero swaps means the overall shape is stable but individual items still move.</div><p class="desc">For each pair of framings: Spearman ρ, % of outcome pairs that swap rank order, and mean absolute rank difference (MAD). Upper triangle shows detail; lower shows ρ only.</p><div class="box">'+pairwiseTable()+'</div><div class="g2"><div class="finding" style="border-left-color:#34d399;background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.15)"><div class="ft" style="color:#34d399">Most aligned pair</div><div class="fd">'+B.best_pair+': ρ='+B.max_rho+'. Rankings barely differ.</div></div><div class="finding" style="border-left-color:#dc2626;background:rgba(185,28,28,.04);border:1px solid rgba(185,28,28,.12)"><div class="ft" style="color:#dc2626">Least aligned pair</div><div class="fd">'+B.worst_pair+': ρ='+B.min_rho+', mean Δrank='+B.mean_mad+'. Ordinal agreement is high but not perfect.</div></div></div></div>'+
    '<div class="box" style="margin-top:10px"><div class="label">Per-category · ρ = internal order agreement (within-category re-rank) · drift = absolute rank range across framings</div>'+catPairwiseTable()+'</div>'+

    '<div class="call" style="background:rgba(185,28,28,.04);border:1px solid rgba(185,28,28,.12)"><div class="ct" style="color:#dc2626">Conclusion</div><div class="cd"><p style="margin-bottom:8px">'+B.label+': Ordinal W='+B.W_global+', ρ='+B.mr+'. Cardinal: XR '+B.xr_mn+'×, '+BOOT.nSig+'/'+B.n_st+' sig, '+B.rv_p+'% reversals.</p><p style="color:#fbbf24;font-style:italic">The instability is a property of the model, not the experimental design.</p></div></div>'+

    '<div class="footer">Against Monolithic Utility v5 · '+B.label+' · T=1.0 · '+B.n_o+' outcomes · '+B.n_r+' repeats · all '+B.n_p+' pairs · 5 framings · '+B.n_v.toLocaleString()+' votes</div>';

  // Interactive pills
  var catEl=document.getElementById("catPills");
  for(var ci=0;ci<CATS.length;ci++){
    (function(c){
      var b=document.createElement("button");b.className="pill"+(c===curCat?" on":"");
      if(c===curCat&&c!=="All"){b.style.borderColor=CAT_COL[c];b.style.color=CAT_COL[c];b.style.background=CAT_COL[c]+"15";}
      b.textContent=c==="All"?"All Categories":c;
      b.onclick=function(){curCat=c;render();};
      catEl.appendChild(b);
    })(CATS[ci]);
  }
  var viewEl=document.getElementById("viewPills");
  ["rank","mu"].forEach(function(v){
    var b=document.createElement("button");b.className="pill"+(v===curView?" on":"");
    b.textContent=v==="rank"?"Rank Position":"µ Utility Value";
    b.onclick=function(){curView=v;render();};viewEl.appendChild(b);
  });
  if(curView==="mu"){
    var b=document.createElement("button");b.className="pill"+(showSig?" on":"");
    if(showSig){b.style.borderColor="#d97706";b.style.color="#d97706";b.style.background="rgba(251,191,36,.12)";}
    b.textContent=showSig?"σ ON":"+ σ";
    b.onclick=function(){showSig=!showSig;render();};b.style.marginLeft="8px";viewEl.appendChild(b);
  }

  var chartEl=document.getElementById("mainChart");
  if(curView==="rank") drawRankDist(chartEl,filtered);
  else drawMuDist(chartEl,filtered,showSig);

  drawValChart(document.getElementById("valDeaths"),"Value of 1 Preventable Death (× $100M)",VAL.deaths,function(d){return d.r;},vdMin,vdMax,"×",vdStep);
  drawValChart(document.getElementById("valYears"),"Value of 1 Healthy Life-Year (× $100M)",VAL.years,function(d){return d.r;},vyMin,vyMax,"×",vyStep);
  drawValChart(document.getElementById("valAnimals"),"Per-Animal Implied $ Value (100 animals each)",VAL.animals.map(function(a){return Object.assign({},a,{r:a.a});}),function(d){return d.a;},0,30000000,"$",5e6,true);
  drawValChart(document.getElementById("valSP"),"Self-Preservation (× $100M)",VAL.sp.map(function(s){return Object.assign({},s,{r:s.l});}),function(d){return d.l;},-2,4,"×",1);
  drawValChart(document.getElementById("valWorld"),"World Events (× $100M)",VAL.world.map(function(s){return Object.assign({},s,{r:s.l});}),function(d){return d.l;},vwMin,vwMax,"×",vwStep);
}

renderTabs();
render();
</script>
</body>
</html>
