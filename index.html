<head>

<title>LLM Country Bias Audit</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050910;--c1:#0c1420;--c2:#101c2e;--bd:#182640;
  --tx:#c8d2e0;--dm:#48597a;--wh:#eaf0f6;
  --cy:#38bdf8;--pk:#e879a8;--gn:#34d399;--rd:#ef4444;
  --am:#fbbf24;--pu:#a78bfa;--or:#fb923c;--id:#818cf8;
}
body{background:var(--bg);color:var(--tx);font-family:'Instrument Sans',system-ui,sans-serif;min-height:100vh;padding:20px 16px;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto}
h1{font-size:26px;font-weight:800;color:var(--wh);letter-spacing:-.5px}
.sub{font-size:12px;color:var(--dm);margin-top:4px;line-height:1.5}
.sub span{font-weight:600}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin:18px 0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:11px 15px;border:none;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:500;color:var(--dm);background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--wh);font-weight:700;background:rgba(129,140,248,.08);border-bottom-color:var(--id)}
.grid{display:grid;gap:10px}
.g4{grid-template-columns:repeat(4,1fr)}
.g2{grid-template-columns:1fr 1fr}
.g1{grid-template-columns:1fr}
.met{background:var(--c1);border:1px solid var(--bd);border-radius:10px;padding:14px 10px;text-align:center;border-top:3px solid var(--id)}
.met .v{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.met .l{font-size:10.5px;font-weight:600;color:var(--tx);margin-top:3px}
.met .s{font-size:9px;color:var(--dm);margin-top:2px}
.sec{margin-bottom:26px}
.sec h3{font-size:15px;font-weight:700;color:var(--wh);margin-bottom:4px}
.sec .desc{font-size:11.5px;color:var(--dm);margin-bottom:12px;line-height:1.5}
.box{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:12px 10px;overflow:auto;margin-bottom:12px}
.box .label{font-size:10px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-family:'IBM Plex Mono',monospace}
.call{border-radius:8px;padding:14px 18px;margin-bottom:16px}
.call .ct{font-size:13px;font-weight:700;margin-bottom:5px}
.call .cd{font-size:11.5px;color:var(--dm);line-height:1.65}
.leg{display:flex;gap:12px;font-size:10px;margin-bottom:10px;flex-wrap:wrap}
.leg .li{display:flex;align-items:center;gap:5px}
.leg .li .dot{width:10px;height:10px;border-radius:2px}
.leg .li span{font-weight:600;font-family:'IBM Plex Mono',monospace}
.pills{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:500;border:1px solid var(--bd);background:var(--c1);color:var(--dm);transition:all .15s}
.pill.on{border:2px solid var(--id);background:rgba(129,140,248,.08);color:var(--id);font-weight:700}
.finding{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:13px 16px;border-left:3px solid var(--id)}
.finding .ft{font-size:11.5px;font-weight:700;margin-bottom:5px}
.finding .fd{font-size:10.5px;color:var(--dm);line-height:1.55}
table{border-collapse:collapse;width:100%;font-size:10px}
th{padding:5px 6px;color:var(--dm);border-bottom:2px solid var(--bd);text-align:left;font-size:9px;font-family:'IBM Plex Mono',monospace}
td{padding:4px 6px;border-bottom:1px solid var(--bd)}
svg{display:block}
.pane{display:none}
.pane.show{display:block}
.footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--bd);font-size:9px;color:var(--dm);text-align:center;font-family:'IBM Plex Mono',monospace}
.attack{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:15px 18px;margin-bottom:10px}
.attack .at{font-size:13px;font-weight:700;margin-bottom:7px}
.attack .ad{font-size:11.5px;color:var(--dm);line-height:1.65}
@media(max-width:600px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>

function S(tag,attrs,parent){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs||{})){if(k==='text'){el.textContent=v;continue}el.setAttribute(k.replace(/([A-Z])/g,'-$1').toLowerCase(),String(v))}if(parent)parent.appendChild(el);return el}

function render(){tabsEl.querySelectorAll('.tab').forEach((t,i)=>t.className='tab'+(i===curTab?' on':''));const el=document.getElementById('content');el.innerHTML='';[buildOverview,buildDistributions,buildSignificance,buildNS,buildConsistency,buildSubjectivity,buildCountries][curTab](el)}

function met(v,l,c,s){return`<div class="met" style="border-top-color:${c||'var(--id)'}"><div class="v" style="color:${c||'var(--id)'}">${v}</div><div class="l">${l}</div>${s?`<div class="s">${s}</div>`:''}</div>`}
function sec(t,s){return`<div class="sec"><h3>${t}</h3>${s?`<p class="desc">${s}</p>`:''}`}
function call(c,t,d){return`<div class="call" style="background:${c}0a;border:1px solid ${c}28"><div class="ct" style="color:${c}">${t}</div><div class="cd">${d}</div></div>`}
function traitPills(sel,fn2){const d=document.createElement('div');d.className='pills';TRAITS.forEach(t=>{const b=document.createElement('button');b.className='pill'+(t===sel?' on':'');b.textContent=TL[t];b.onclick=()=>{fn2(t)};d.appendChild(b)});return d}
function modelPills(sel,fn2){const d=document.createElement('div');d.className='pills';MODELS.forEach((m,i)=>{const b=document.createElement('button');b.className='pill'+(i===sel?' on':'');b.textContent=m.name;if(i===sel){b.style.color=m.col;b.style.borderColor=m.col}b.onclick=()=>{fn2(i)};d.appendChild(b)});return d}
function legend(items){let h='<div class="leg">';items.forEach(([l,c])=>h+=`<div class="li"><div class="dot" style="background:${c}"></div><span style="color:${c}">${l}</span></div>`);return h+'</div>'}

function drawDistView(parent,trait,midx){

  const W=700,rowH=46,lM=110,rM=14,tM=30,cW=W-lM-rM;
  const xS=r=>lM+((r-.5)/15)*cW;
  const sorted=[...CS].sort((a,b)=>{const f=c=>ucs.reduce((s,uc)=>(s+(bcd[trait]?.[c]?.[uc]?.mu||8)),0)/ucs.length;return f(a)-f(b)});
  const tH=tM+sorted.length*rowH+10;
  const s=svg(W,tH,parent);
  for(let r=1;r<=15;r++){S('line',{x1:xS(r),y1:tM-3,x2:xS(r),y2:tH-6,stroke:'var(--bd)',strokeWidth:.5},s);S('text',{x:xS(r),y:tM-7,textAnchor:'middle',fill:'var(--dm)',fontSize:8,fontFamily:fn,text:'#'+r},s)}
  sorted.forEach((c,idx)=>{
    const yO=tM+idx*rowH,isN=NORTH.includes(c),cS=sfData[c]||[];
    S('rect',{x:0,y:yO,width:W,height:rowH,fill:idx%2===0?'var(--c1)':'transparent'},s);
    if(cS.length>0)S('rect',{x:lM-2,y:yO,width:cW+4,height:rowH,fill:'rgba(239,68,68,.06)',rx:3},s);
    S('rect',{x:4,y:yO+rowH/2-4,width:6,height:8,rx:2,fill:isN?'var(--id)':'var(--or)',fillOpacity:.6},s);
    S('text',{x:lM-6,y:yO+rowH/2+1,textAnchor:'end',fill:cS.length>0?'var(--rd)':'var(--tx)',fontSize:9,fontFamily:fs,fontWeight:cS.length>0?700:500,dominantBaseline:'middle',text:c.length>13?c.substring(0,12)+'…':c},s);
    if(cS.length>0)S('text',{x:lM-6,y:yO+rowH/2+11,textAnchor:'end',fill:'var(--rd)',fontSize:7,dominantBaseline:'middle',text:'⚡'+cS.length+' sig'},s);
    const barH=7,gap=1,totalH=ucs.length*(barH+gap)-gap,startY=yO+(rowH-totalH)/2;
    ucs.forEach((uc,ui)=>{const d=bcd[trait]?.[c]?.[uc];if(!d)return;const isSig=cS.includes(uc),col=uc_col[uc],y=startY+ui*(barH+gap),ciW=xS(d.hi)-xS(d.lo);
      if(ciW>1)S('rect',{x:xS(d.lo),y:y,width:ciW,height:barH,fill:col,fillOpacity:isSig?.4:.18,rx:barH/2,stroke:col,strokeWidth:isSig?1.2:.4,strokeOpacity:isSig?.9:.4},s);
      S('circle',{cx:xS(d.mu),cy:y+barH/2,r:isSig?4:d.std<0.01?3.5:3,fill:col,stroke:isSig?'var(--wh)':'rgba(255,255,255,.15)',strokeWidth:isSig?1.3:.5},s)})
  })
}

}

function buildNS(el){
  el.innerHTML=`${sec('The North-South Gap','Positive = North favoured. Negative = South favoured.')}<div class="box" id="ns-chart"></div></div>
  ${call('var(--pk)','Three models, three directions','Llama 70B favours North (+2.54 neutral). Qwen favours South (−5.83 vlog). Llama 7B provides a third data point on the same question.')}
  ${sec('Absolute Ranks')}
  <div class="grid g1" style="gap:10px">
  ${MODELS.map(m=>{const ucs=m.ucs;return`<div class="box"><div class="label">${m.name}</div><table><thead><tr>${['Persona','North','South','Gap'].map(h=>`<th style="text-align:center">${h}</th>`).join('')}</tr></thead><tbody>
  ${ucs.map(uc=>{const x=m.nl[uc]||{};return`<tr><td style="text-align:center;color:${uc_col[uc]};font-weight:700">${ucName(uc)}</td><td style="text-align:center;color:var(--id);font-weight:600">${x.north}</td><td style="text-align:center;color:var(--or);font-weight:600">${x.south}</td><td style="text-align:center;color:${x.gap>0?'var(--rd)':x.gap<-1?'var(--gn)':'var(--am)'};font-weight:800">${x.gap>0?'+':''}${x.gap}</td></tr>`}).join('')}
  </tbody></table></div>`}).join('')}</div></div>`;
  drawNSChart(document.getElementById('ns-chart'));
}

function buildConsistency(el){
  el.innerHTML=`${sec('AB/BA Consistency','Red=50%, Green=80%.')}<div id="cons-trait-pills"></div><div class="box" id="cons-bars"></div>
  ${legend(MODELS.map(m=>[m.name.split(' ')[0]+(m.name.includes('8B')?' 8B':m.name.includes('70B')?' 70B':''),m.col]))}
  </div>
  ${sec('Full Matrix')}
  <div class="grid g1" style="gap:10px">
  ${MODELS.map(m=>`<div class="box"><div class="label">${m.name}</div><table><thead><tr><th></th>${TRAITS.map(t=>`<th style="text-align:center;font-size:7px">${TL[t].split(' ')[0]}</th>`).join('')}</tr></thead><tbody>
  ${m.ucs.map(uc=>`<tr><td style="color:${uc_col[uc]};font-weight:700">${ucName(uc)}</td>${TRAITS.map(t=>{const v=m.cl[`${uc}|${t}`]||0;return`<td style="text-align:center;font-weight:600;color:${cC(v)};background:${v<50?'rgba(239,68,68,.08)':v>=90?'rgba(52,211,153,.06)':'transparent'}">${v>0?v.toFixed(0):'-'}</td>`}).join('')}</tr>`).join('')}
  </tbody></table></div>`).join('')}
  </div></div>`;
  document.getElementById('cons-trait-pills').appendChild(traitPills(curTrait,t=>{curTrait=t;render()}));
  drawConsBars(document.getElementById('cons-bars'),curTrait);
}

function buildSubjectivity(el){
  el.innerHTML=`${sec('The Subjectivity Gradient')}
  <div class="box"><table><thead><tr>${["Trait","Type","L70 Sig","Q Sig","L7 Sig"].map(h=>`<th style="text-align:${h==='Trait'||h==='Type'?'left':'center'}">${h}</th>`).join('')}</tr></thead><tbody>
  ${TRAITS.map(t=>{const isFact=t==='democratic'||t==='life_expectancy';
    return`<tr style="background:${isFact?'rgba(129,140,248,.04)':'transparent'}">
      <td style="font-weight:700">${TL[t]}</td>
      <td style="color:${isFact?'var(--id)':'var(--or)'};font-weight:700;font-size:9px">${isFact?'FACTUAL':'SUBJECTIVE'}</td>
      ${MODELS.map(m=>{const n=Object.entries(m.zt).filter(([k,v])=>k.startsWith(t+'|')&&v.s).length;return`<td style="text-align:center;color:${n>=5?'var(--gn)':n>0?'var(--am)':'var(--rd)'};font-weight:800;font-size:14px">${n}/6</td>`}).join('')}
    </tr>`}).join('')}
  </tbody></table></div></div>
  ${sec('Gradient Visualisation')}<div class="box" id="subj-scatter"></div>${legend([['Factual','var(--id)'],['Subjective','var(--or)']])}</div>
  ${call('var(--am)','The factual firewall degrades with model size','L70: 0/12 factual tests significant. Qwen: 8/12. L7: 4/12. Smaller or MoE models are less able to maintain stable factual rankings under persona pressure.')}`;
  drawSubjScatter(document.getElementById('subj-scatter'));
}

function buildCountries(el){
  el.innerHTML=`
  ${sec('Country Volatility','Avg rank spread across personas (subjective traits).')}
    <div class="box" id="ctr-vol"></div>
    ${legend(MODELS.map(m=>[m.name.split(' ')[0]+(m.name.includes('8B')?' 8B':m.name.includes('70B')?' 70B':''),m.col]).concat([['North','var(--id)'],['South','var(--or)']]))}
  </div>
  ${call('var(--pu)','Different vulnerabilities','Llama 70B most volatile: Czechia. Qwen: France, Japan — North countries demoted under informal personas. Llama 8B adds its own pattern.')}`;
  drawVolChart(document.getElementById('ctr-vol'));
}

render();
</script>
</body>
</html>
