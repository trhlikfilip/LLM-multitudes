.call .ct{font-size:13px;font-weight:700;margin-bottom:5px}
.call .cd{font-size:11.5px;color:var(--dm);line-height:1.65}
.leg{display:flex;gap:12px;font-size:10px;margin-bottom:10px;flex-wrap:wrap}
.leg .li{display:flex;align-items:center;gap:5px}
.leg .li .dot{width:10px;height:10px;border-radius:2px}
.leg .li span{font-weight:600;font-family:'IBM Plex Mono',monospace}
.pills{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:500;border:1px solid var(--bd);background:var(--c1);color:var(--dm);transition:all .15s}
.pill.on{border:2px solid var(--id);background:rgba(129,140,248,.08);color:var(--id);font-weight:700}

.finding .fd{font-size:10.5px;color:var(--dm);line-height:1.55}

th{padding:5px 6px;color:var(--dm);border-bottom:2px solid var(--bd);text-align:left;font-size:9px;font-family:'IBM Plex Mono',monospace}
td{padding:4px 6px;border-bottom:1px solid var(--bd)}
svg{display:block}
.pane{display:none}
.pane.show{display:block}
.footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--bd);font-size:9px;color:var(--dm);text-align:center;font-family:'IBM Plex Mono',monospace}
.attack{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:15px 18px;margin-bottom:10px}

// SVG helper
function S(tag,attrs,parent){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='text'){el.textContent=v;continue}
    el.setAttribute(k.replace(/([A-Z])/g,'-$1').toLowerCase(),String(v))
  }
  if(parent)parent.appendChild(el);
  return el;
}
function svg(w,h,parent){
  const el=S('svg',{width:w,height:h});
  el.style.display='block';
  if(parent)parent.appendChild(el);
  return el;
}

// Gaussian path
function gaussPath(lo,hi,med,width,xS,yBase,height){
  const sigma=width>0?width/3.92:.18,mu=med,pk=gauss(mu,mu,sigma);
  const rs=Math.max(.5,mu-4*sigma),re=Math.min(15.5,mu+4*sigma);
  let d=`M ${xS(rs)} ${yBase+height}`;
  for(let i=0;i<=40;i++){
    const x=rs+(re-rs)*(i/40);
    d+=` L ${xS(x)} ${yBase+height*(1-gauss(x,mu,sigma)/pk*.8)}`;
  }
  d+=` L ${xS(re)} ${yBase+height} Z`;
  return d;
}

function drawCountrySlope(parent){
  const W=700,H=500,lM=125,rM=125,tM=30,cH=H-tM-10;
  const sorted=[...CS].sort((a,b)=>PCL[a]-PCL[b]);

  S('text',{x:xL,y:tM-14,fill:'var(--cy)',fontSize:11,fontFamily:fn,fontWeight:700,text:'Llama'},s);
  S('text',{x:xQ,y:tM-14,textAnchor:'end',fill:'var(--pk)',fontSize:11,fontFamily:fn,fontWeight:700,text:'Qwen'},s);
  S('line',{x1:xL,y1:tM,x2:xL,y2:H-10,stroke:'var(--bd)'},s);
  S('line',{x1:xQ,y1:tM,x2:xQ,y2:H-10,stroke:'var(--bd)'},s);

    S('text',{x:xL-6,y:yS(lv)+3,textAnchor:'end',fill:'var(--tx)',fontSize:8,fontFamily:fs,text:c.substring(0,11)+' #'+Math.round(lv)},s);

}

function drawScatter(parent,trait,uc){

  ${sec('The North-South Inversion','Positive = North favoured. Negative = South favoured.')}
  <div class="box" id="ns-chart"></div></div>
  ${call('var(--pk)','Complete directional inversion','Llama: +2.61 (neutral) to +0.33 (vlog). Qwen: −2.61 (neutral) to −5.83 (vlog). Under vlog, Qwen gives South avg rank 5.28 vs North 11.11.')}
  ${sec('Per-Country Slope','Lines connect same country\'s avg subjective rank across models.')}
  <div class="box" id="ns-slope"></div>
  ${legend([['North','var(--id)'],['South','var(--or)'],['Δ≥4','var(--rd)'],['Δ≥2','var(--am)']])}
  </div>
  ${sec('Absolute Ranks')}
  <div class="grid g2">
    <div class="box"><div class="label">Llama 3.3 70B</div><table><thead><tr>${['Persona','North','South','Gap'].map(h=>`<th style="text-align:center">${h}</th>`).join('')}</tr></thead><tbody>
    ${UL.map(uc=>{const x=NL[uc]||{};return`<tr><td style="text-align:center;color:${uc_col[uc]};font-weight:700">${ucDisplay[uc]||uc}</td><td style="text-align:center;color:var(--id);font-weight:600">${x.north}</td><td style="text-align:center;color:var(--or);font-weight:600">${x.south}</td><td style="text-align:center;color:${x.gap>0?'var(--rd)':x.gap<-1?'var(--gn)':'var(--am)'};font-weight:800">${x.gap>0?'+':''}${x.gap}</td></tr>`}).join('')}
    </tbody></table></div>
    <div class="box"><div class="label">Qwen3 30B-A3B</div><table><thead><tr>${['Persona','North','South','Gap'].map(h=>`<th style="text-align:center">${h}</th>`).join('')}</tr></thead><tbody>
    ${UQ.map(uc=>{const x=NQ[uc]||{};return`<tr><td style="text-align:center;color:${uc_col[uc]};font-weight:700">${ucDisplay[uc]||uc}</td><td style="text-align:center;color:var(--id);font-weight:600">${x.north}</td><td style="text-align:center;color:var(--or);font-weight:600">${x.south}</td><td style="text-align:center;color:${x.gap>0?'var(--rd)':x.gap<-1?'var(--gn)':'var(--am)'};font-weight:800">${x.gap>0?'+':''}${x.gap}</td></tr>`}).join('')}
    </tbody></table></div>
  </div></div>`;
  drawNSChart(document.getElementById('ns-chart'));
  drawCountrySlope(document.getElementById('ns-slope'));
}

function buildConsistency(el){
  el.innerHTML=`
  ${sec('AB/BA Consistency Comparison','Red dashed = 50%. Green dashed = 80%.')}
  <div id="cons-trait-pills"></div>
  <div class="box" id="cons-bars"></div>
  ${legend([['Llama','var(--cy)'],['Qwen','var(--pk)']])}
  </div>
  ${call('var(--rd)','Qwen instability','Better Vibes neutral: Llama 85% vs Qwen 37.5%. Cool People reddit: Llama 71% vs Qwen 48%.')}
  ${sec('Full Consistency Matrix')}
  <div class="grid g2">
    ${['Llama','Qwen'].map((label,mi)=>{
      const data=mi===0?CL:CQ,ucs=mi===0?UL:UQ;
      return`<div class="box"><div class="label">${label}</div><table><thead><tr><th></th>${TRAITS.map(t=>`<th style="text-align:center;font-size:7px">${TL[t].split(' ')[0]}</th>`).join('')}</tr></thead><tbody>
      ${ucs.map(uc=>`<tr><td style="color:${uc_col[uc]};font-weight:700">${ucDisplay[uc]||uc}</td>${TRAITS.map(t=>{const v=data[`${uc}|${t}`]||0;return`<td style="text-align:center;font-weight:600;color:${cC(v)};background:${v<50?'rgba(239,68,68,.08)':v>=90?'rgba(52,211,153,.06)':'transparent'}">${v>0?v.toFixed(0):'-'}</td>`}).join('')}</tr>`).join('')}
      </tbody></table></div>`;
    }).join('')}
  </div></div>`;
  document.getElementById('cons-trait-pills').appendChild(traitPills(curTrait,t=>{curTrait=t;render()}));
  drawConsBars(document.getElementById('cons-bars'),curTrait);
}

function buildSubjectivity(el){
  const immL={"democratic":9,"life_expectancy":11,"better_vibes":3,"beutyful_people":4,"cool_people":3,"interesting_culture":5};
  const immQ={"life_expectancy":10,"democratic":2,"beutyful_people":1,"interesting_culture":1};
  el.innerHTML=`
  ${sec('The Subjectivity Gradient','Factual and subjective traits are two categorically different systems.')}
  <div class="box"><table><thead><tr>${["Trait","Type","L Sig","L ρ","Q ρ","CM ρ","L Imm","Q Imm"].map(h=>`<th style="text-align:${h==='Trait'||h==='Type'?'left':'center'}">${h}</th>`).join('')}</tr></thead><tbody>
  ${TRAITS.map(t=>{
    const isFact=t==='democratic'||t==='life_expectancy';
    const sigC=Object.entries(PT).filter(([k,v])=>k.startsWith(t+'|')&&v.s).length;
    const slV=Object.values(SL[t]||{}),avgL=slV.length?slV.reduce((s,v)=>s+v,0)/slV.length:0;
    const sqV=Object.values(SQ[t]||{}),avgQ=sqV.length?sqV.reduce((s,v)=>s+v,0)/sqV.length:0;
    const cmVals=["neutral","reddit","school","vlog"].map(uc=>CM[`${t}|${uc}`]||0),cmAvg=cmVals.reduce((s,v)=>s+v,0)/4;
    const iL=immL[t]||0,iQ=immQ[t]||0;
    return`<tr style="background:${isFact?'rgba(129,140,248,.04)':'transparent'}">
      <td style="font-weight:700">${TL[t]}</td>
      <td style="color:${isFact?'var(--id)':'var(--or)'};font-weight:700;font-size:9px">${isFact?'FACTUAL':'SUBJECTIVE'}</td>
      <td style="text-align:center;color:${sigC>=5?'var(--gn)':sigC>0?'var(--am)':'var(--rd)'};font-weight:800;font-size:14px">${sigC}/6</td>
      <td style="text-align:center;color:${rC(avgL)};font-weight:600;font-family:${fn}">${avgL.toFixed(2)}</td>
      <td style="text-align:center;color:${rC(avgQ)};font-weight:600;font-family:${fn}">${avgQ.toFixed(2)}</td>
      <td style="text-align:center;color:${rC(cmAvg)};font-weight:700;font-family:${fn}">${cmAvg.toFixed(2)}</td>
      <td style="text-align:center;color:${iL>=9?'var(--id)':'var(--dm)'}">${iL}/15</td>
      <td style="text-align:center;color:${iQ>=5?'var(--pk)':'var(--dm)'}">${iQ}/15</td></tr>`}).join('')}
  </tbody></table></div></div>
  ${sec('Gradient Visualisation','Cross-model agreement (x) vs persona sensitivity (y). Factual and subjective traits form two distinct clusters.')}
  <div class="box" id="subj-scatter"></div>
  ${legend([['Factual','var(--id)'],['Subjective','var(--or)']])}
  </div>
  ${call('var(--am)','Two phenomena, not one','Life Expectancy: 0/6 sig, CM ρ=0.954, 11 Llama immovable. Beautiful People: 6/6 sig, CM ρ=0.369, 4 Llama immovable. These are categorically different systems.')}
  ${sec('Three Lines of Evidence')}
  <div class="attack" style="border-left:3px solid var(--gn)"><div class="at" style="color:var(--gn)">1 — Manufactured Monolith</div><div class="ad">Within-usecase ρ = 0.938 but between-usecase ρ = 0.864 for subjective traits. The lowest pairwise ρ (reddit↔vlog Better Vibes) is 0.739 — those two personas share only 74% of their ranking structure. A single-prompt audit captures one of several distinct ranking regimes.</div></div>
  <div class="attack" style="border-left:3px solid var(--pk)"><div class="at" style="color:var(--pk)">2 — N-S Inversion</div><div class="ad">Llama's North advantage (+2.61 neutral) shrinks 87% under vlog. Qwen completely inverts it: South leads by −5.83 under vlog. Geographic privilege is both persona-dependent and model-dependent.</div></div>
  <div class="attack" style="border-left:3px solid var(--cy)"><div class="at" style="color:var(--cy)">3 — Cross-Model Divergence</div><div class="ad">Cross-model ρ = 0.334 for Better Vibes. Nigeria: Llama #13, Qwen #1 for Better Vibes vlog (Δ12). US: Llama #4, Qwen #13 (Δ9). If bias were structural, models trained on overlapping corpora should converge. They don't.</div></div>
  </div>`;
  drawSubjScatter(document.getElementById('subj-scatter'));
}

function buildCountries(el){
  el.innerHTML=`
  ${sec('Country Volatility','Avg rank spread across personas (subjective traits).')}
  <div class="box" id="ctr-vol"></div>
  ${legend([['Llama','var(--cy)'],['Qwen','var(--pk)'],['North','var(--id)'],['South','var(--or)']])}
  </div>
  ${call('var(--pu)','Different vulnerabilities','Llama most volatile: Czechia (5.5). Qwen: France (6.25), Japan (6.0) — North countries Qwen demotes under informal personas.')}
  ${sec('Per-Country Rank Comparison')}
  <div class="box" id="ctr-slope"></div></div>`;
  drawVolChart(document.getElementById('ctr-vol'));
  drawCountrySlope(document.getElementById('ctr-slope'));
}

render();
</script>
